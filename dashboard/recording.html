<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording - BugReel</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/i18n-dashboard.js"></script>
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <div id="content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <script type="module">
    import {
      getRecording, videoUrl, frameUrl,
      updateKeyframes, addKeyframe, deleteKeyframe,
      updateCard, updateTranscript, updateContext,
      exportToYoutrack, searchYoutrackIssues, linkToYoutrack,
      preLinkYoutrack, clearPreLink,
      getVideoComments, addVideoComment, deleteVideoComment,
      setRecordingPassword, removeRecordingPassword
    } from '../js/api.js';
    import {
      renderHeader, extractParam, formatDate, formatDuration, formatTimecode,
      statusLabel, categoryLabel, csCircleHTML,
      renderDescription, escapeHTML, icons, timeAgo
    } from '../js/shared.js';
    import { createTimeline } from '../js/timeline.js';
    import { renderViewAnalytics } from '../js/analytics.js';
    import { showEmbedModal } from '../js/embed-modal.js';
    import { initQuotaWidget } from '../js/quota.js';

    const t = window.__dashboardI18n?.t || ((k, f) => f || k);
    document.getElementById('header').innerHTML = renderHeader('recordings');
    initQuotaWidget();

    const content = document.getElementById('content');
    const recordingId = extractParam('/recording/');
    const config_youtrackUrl = window.__BUGREEL_CONFIG__?.youtrackUrl || '';
    let timeline = null;
    let currentData = null;
    let trackerConfigured = false; // loaded from /api/settings

    if (!recordingId) {
      content.innerHTML = `<div class="empty-state">${icons.alertTriangle}<p>${t('no_recording_id', 'No recording ID in URL')}</p></div>`;
    }

    async function load() {
      try {
        // Load tracker settings and recording data in parallel
        const [data, settingsRes] = await Promise.all([
          getRecording(recordingId),
          fetch('/api/settings').then(r => r.ok ? r.json() : null).catch(() => null),
        ]);
        if (settingsRes) {
          trackerConfigured = settingsRes.tracker_type && settingsRes.tracker_type !== 'none';
        }
        currentData = data;
        render(data);
        document.title = data.card
          ? `${data.card.title} - BugReel`
          : `${recordingId} - BugReel`;
      } catch (err) {
        content.innerHTML = `<div class="empty-state">${icons.alertTriangle}<p>${t('failed_load_recordings', 'Failed to load recording')}: ${escapeHTML(err.message)}</p></div>`;
      }
    }

    function render({ recording, frames, card, comments }) {
      const r = recording;
      const analysis = r.analysis || {};
      const transcript = r.transcript || {};
      content.innerHTML = `
        <!-- Back link -->
        <a href="../" class="back-link">${icons.arrowLeft} ${t('back_to_recordings', 'Back to recordings')}</a>

        <!-- Header -->
        <div class="detail-header" style="align-items:flex-start;">
          ${card && card.cs_total != null ? `<div style="margin-top:4px;">${csCircleHTML(card.cs_total, card.cs_category, 'cs-circle-lg')}</div>` : ''}
          <div style="flex:1;">
            <h1>${card ? escapeHTML(card.title || 'Untitled') : `<span style="font-family:'JetBrains Mono','Fira Code',monospace;">${escapeHTML(r.id)}</span>`}</h1>
            ${card?.summary ? `<p class="card-summary">${escapeHTML(card.summary)}</p>` : ''}
          </div>
          ${r.status === 'complete' && card ? `
            <button class="btn btn-sm" id="btnPassword" title="${r.has_password ? t('password_protected', 'Password protected') : t('set_password', 'Set password')}" style="margin-top:4px; ${r.has_password ? 'color:var(--amber);' : ''}">
              ${r.has_password ? icons.lock : icons.unlock}
            </button>
            <button class="btn btn-sm" id="btnEmbed" title="Embed" style="margin-top:4px;">
              ${icons.code}
            </button>
            <button class="btn btn-sm" id="btnShareLink" title="Copy link" style="margin-top:4px;">
              ${icons.share}
            </button>
          ` : ''}
        </div>

        <!-- Password protection panel (hidden by default) -->
        <div class="password-panel hidden mb-16" id="passwordPanel">
          <div class="column-panel" style="max-width:480px;">
            <div class="column-panel-header">
              <span class="column-panel-label">${icons.lock} ${t('password_protection', 'Password Protection')}</span>
              <button class="column-edit-btn" id="btnClosePassword" title="Close">${icons.x}</button>
            </div>
            <div class="column-panel-body" style="padding:16px;">
              ${r.has_password ? `
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                  <span class="badge badge-amber" style="background:var(--amber-dim); color:var(--amber);">${icons.lock} ${t('protected', 'Protected')}</span>
                  <span class="text-dim text-xs">${t('password_set_desc', 'Viewers must enter a password to access this recording')}</span>
                </div>
                <div style="display:flex; gap:8px;">
                  <button class="btn btn-sm" id="btnChangePassword">${t('change_password', 'Change password')}</button>
                  <button class="btn btn-sm" id="btnRemovePassword" style="color:var(--red);">${t('remove_password', 'Remove password')}</button>
                </div>
                <div class="hidden" id="changePasswordForm" style="margin-top:12px;">
                  <div style="display:flex; gap:8px;">
                    <input type="password" id="newPasswordInput" class="edit-field" placeholder="${t('new_password', 'New password')}" style="flex:1; padding:8px 12px;" />
                    <button class="btn btn-sm btn-primary" id="btnSaveNewPassword">${t('save', 'Save')}</button>
                  </div>
                </div>
              ` : `
                <p class="text-dim" style="margin-bottom:12px; font-size:0.85rem;">${t('password_not_set_desc', 'Set a password to restrict access to this recording. Viewers will need to enter the password before watching.')}</p>
                <div style="display:flex; gap:8px;">
                  <input type="password" id="newPasswordInput" class="edit-field" placeholder="${t('enter_password', 'Enter password (min 4 chars)')}" style="flex:1; padding:8px 12px;" />
                  <button class="btn btn-sm btn-primary" id="btnSaveNewPassword">${t('set_password', 'Set password')}</button>
                </div>
              `}
              <div class="text-xs hidden" id="passwordStatus" style="margin-top:8px;"></div>
            </div>
          </div>
        </div>

        <!-- Meta (single line: badge + author + date + duration + youtrack) -->
        <div class="detail-meta mb-16">
          ${card?.type ? `<span class="badge badge-${card.type}">${escapeHTML(card.type)}</span>` : ''}
          ${card?.cs_category ? `<span class="badge badge-${card.cs_category}">${categoryLabel(card.cs_category)}</span>` : ''}
          ${r.has_password ? `<span class="badge badge-amber" style="background:var(--amber-dim); color:var(--amber); gap:4px;">${icons.lock} ${t('protected', 'Protected')}</span>` : ''}
          <span class="detail-meta-item">${icons.user} ${escapeHTML(r.author || '--')}</span>
          <span class="detail-meta-item">${icons.calendar} ${formatDate(r.created_at)}</span>
          <span class="detail-meta-item">${icons.clock} ${formatDuration(r.duration_seconds)}</span>
          <span class="detail-meta-item" id="viewCountMeta">${icons.eye} --</span>
          ${renderYouTrackSection(r, card)}
        </div>

        <!-- Processing status banner -->
        ${r.status !== 'complete' && r.status !== 'error' ? `
          <div class="processing-banner mb-16" id="processingBanner">
            <div class="processing-banner-content">
              <div class="spinner-sm"></div>
              <div>
                <div class="processing-banner-title">${t('processing_recording', 'Processing recording...')}</div>
                <div class="processing-banner-status">${renderPipelineStatus(r.status)}</div>
              </div>
            </div>
            <div class="processing-progress">
              ${renderPipelineProgress(r.status)}
            </div>
          </div>
        ` : ''}
        ${r.status === 'error' ? `
          <div class="processing-banner processing-banner-error mb-16">
            <div class="processing-banner-content">
              ${icons.alertTriangle}
              <div>
                <div class="processing-banner-title">${t('processing_error', 'Processing error')}</div>
                <div class="processing-banner-status">${t('try_again', 'Try uploading the recording again')}</div>
              </div>
            </div>
          </div>
        ` : ''}

        <!-- Video + Key Frames Index -->
        <div class="video-keyframes-row mb-16">
          <!-- LEFT: Video + Timeline -->
          <div class="video-col">
            <div class="video-container">
              <video id="videoPlayer" controls preload="metadata">
                <source src="${videoUrl(r.id)}" type="video/webm">
              </video>
            </div>
            <div id="urlBar" class="url-bar hidden">
              <span class="url-bar-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
              </span>
              <span id="urlBarText" class="url-bar-text"></span>
            </div>
            <div id="timelineContainer"></div>
            <div class="timeline-actions" style="margin-top:4px;">
              <span class="text-dim text-xs" id="timelineStatus"></span>
            </div>
          </div>

          <!-- RIGHT: Key Frames Index -->
          <div class="keyframes-index" id="keyframesIndex">
            <div class="keyframes-index-header">
              <span>${t('key_moments', 'Key Moments')}</span>
              <span class="text-dim text-xs">${frames.length}</span>
            </div>
            <div class="keyframes-index-list" id="keyframesList">
              ${frames.length > 0 ? frames.map(f => `
                <div class="keyframe-item" data-frame-id="${f.id}" data-time="${f.time_seconds}">
                  <img class="keyframe-thumb" src="${frameUrl(r.id, f.filename)}" alt="" loading="lazy" />
                  <div class="keyframe-info">
                    <div class="keyframe-title">${escapeHTML(f.description || '')}</div>
                    ${f.detail ? `<div class="keyframe-detail">${escapeHTML(f.detail)}</div>` : ''}
                    <span class="keyframe-time">${formatTimecode(f.time_seconds)}</span>
                  </div>
                  <button class="keyframe-delete" data-frame-id="${f.id}" title="Delete">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  </button>
                </div>
              `).join('') : `<div class="keyframes-empty text-dim">${t('no_key_frames', 'No key frames')}</div>`}
            </div>
          </div>
        </div>

        <!-- Three columns: Description | Transcript | Context -->
        <div class="three-columns mb-16">
          <!-- Column 1: Description (editable via modal) -->
          <div class="column-panel">
            <div class="column-panel-header">
              <span class="column-panel-label">${icons.sparkle} ${t('description', 'Description')}</span>
              ${card ? `<button class="column-edit-btn" id="btnEditDesc" title="Edit">${icons.pencil}</button>` : ''}
            </div>
            <div class="column-panel-body">
              ${Object.keys(analysis).length > 0 ? renderAnalysisFields(analysis) : `<div class="text-dim">${t('no_analysis', 'No analysis data')}</div>`}
            </div>
          </div>

          <!-- Column 2: Transcript (word-level editing) -->
          <div class="column-panel">
            <div class="column-panel-header">
              <span class="column-panel-label">${icons.messageCircle} ${t('transcript', 'Transcript')}</span>
              ${transcript.words?.length ? `<button class="column-edit-btn" id="btnEditTranscript" title="Edit">${icons.pencil}</button>` : ''}
            </div>
            <div class="column-panel-body">
              <div id="transcriptView">
                ${transcript.text ? `
                  <div id="transcriptBox" style="font-size:0.85rem; line-height:1.7; color:var(--text2);">
                    ${renderTranscript(transcript)}
                  </div>
                ` : `<div class="text-dim">${t('no_transcript', 'No transcript')}</div>`}
              </div>
              <div id="transcriptEdit" class="hidden column-edit-form">
                <div class="transcript-words-editor" id="wordsEditor"></div>
                <div class="column-edit-actions">
                  <button class="btn btn-edit-save" id="btnSaveTranscript">${t('save', 'Save')}</button>
                  <button class="btn btn-edit-cancel" id="btnCancelTranscript">${t('cancel', 'Cancel')}</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Column 3: Context (editable — delete items) -->
          <div class="column-panel">
            <div class="column-panel-header">
              <span class="column-panel-label">${icons.layers} ${t('context', 'Context')}</span>
              <button class="column-edit-btn" id="btnEditContext" title="Edit">${icons.pencil}</button>
            </div>
            <div class="column-panel-body">
              <div id="contextView">
                ${renderContextTab(r)}
              </div>
              <div id="contextEdit" class="hidden">
                <div id="contextEditList"></div>
                <div class="column-edit-actions">
                  <button class="btn btn-edit-save" id="btnSaveContext">${t('save', 'Save')}</button>
                  <button class="btn btn-edit-cancel" id="btnCancelContext">${t('cancel', 'Cancel')}</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- View Analytics Panel -->
        <div id="viewAnalyticsPanel" class="mb-16"></div>

        <!-- Video Comments Panel -->
        <div class="column-panel mb-16" id="videoCommentsPanel">
          <div class="column-panel-header">
            <span class="column-panel-label">${icons.messageCircle} Comments <span id="vCommentCount" style="color:var(--text3);font-size:0.75rem;margin-left:4px;">...</span></span>
          </div>
          <div class="column-panel-body">
            <div id="vCommentList" style="max-height:400px;overflow-y:auto;margin-bottom:12px;">
              <div class="text-dim" style="text-align:center;padding:12px;">Loading comments...</div>
            </div>
            <div style="border-top:1px solid var(--border);padding-top:12px;">
              <div style="display:flex;gap:8px;margin-bottom:8px;">
                <input type="text" id="vCommentAuthor" placeholder="Your name" maxlength="100" class="edit-field" style="flex:1;" />
              </div>
              <textarea id="vCommentText" placeholder="Write a comment..." rows="2" maxlength="2000" class="edit-field" style="width:100%;resize:vertical;"></textarea>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
                <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2);cursor:pointer;">
                  <input type="checkbox" id="vCommentTimecodeCheck" style="accent-color:var(--blue);" />
                  Link to current time
                  <span id="vCommentTimecodePreview" style="display:none;background:var(--blue-dim);color:var(--blue);font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:4px;font-family:monospace;"></span>
                </label>
                <button class="btn btn-sm btn-primary" id="vCommentSubmit" style="gap:4px;">${icons.send} Post</button>
              </div>
              <div id="vCommentError" style="display:none;color:var(--red);font-size:0.8rem;margin-top:6px;"></div>
            </div>
          </div>
        </div>

        <!-- Description edit modal -->
        ${card ? `
        <div class="modal-overlay hidden" id="descModal">
          <div class="modal-dialog">
            <div class="modal-header">
              <h3>${icons.sparkle} ${t('edit_description', 'Edit Description')}</h3>
              <button class="modal-close" id="btnCloseDescModal">${icons.x}</button>
            </div>
            <div class="modal-body">
              <div class="modal-row">
                <div class="modal-field" style="flex:1;">
                  <label class="column-edit-label">${t('title', 'Title')}</label>
                  <input type="text" id="editTitle" class="edit-field" value="${escapeHTML(card.title || '')}" />
                </div>
                <div class="modal-field" style="width:160px;">
                  <label class="column-edit-label">${t('type', 'Type')}</label>
                  <select id="editType" class="edit-field">
                    <option value="bug" ${card.type === 'bug' ? 'selected' : ''}>${t('type_bug', 'Bug')}</option>
                    <option value="feature" ${card.type === 'feature' ? 'selected' : ''}>${t('type_feature', 'Feature')}</option>
                    <option value="enhancement" ${card.type === 'enhancement' ? 'selected' : ''}>${t('type_enhancement', 'Enhancement')}</option>
                    <option value="demo" ${card.type === 'demo' ? 'selected' : ''}>${t('type_demo', 'Demo')}</option>
                  </select>
                </div>
              </div>
              <label class="column-edit-label">${t('description', 'Description')}</label>
              <textarea id="editDescription" class="edit-field" rows="14">${escapeHTML(card.description || '')}</textarea>
            </div>
            <div class="modal-footer">
              <button class="btn btn-edit-cancel" id="btnCancelDesc">${t('cancel', 'Cancel')}</button>
              <button class="btn btn-edit-save" id="btnSaveDesc">${t('save', 'Save')}</button>
            </div>
          </div>
        </div>
        ` : ''}
      `;

      setupVideoInteractions(frames, transcript);
      setupKeyframesIndex(frames);
      // Auto-refresh if still processing
      if (r.status !== 'complete' && r.status !== 'error') {
        startAutoRefresh();
      }
      if (card) {
        setupDescriptionEdit(card);
      }
      setupTranscriptEdit(transcript);
      setupContextEdit(r);
      setupShareButton();
      setupEmbedButton();
      setupPasswordPanel(r);
      setupYoutrackPanel(r, card);

      // Load view analytics panel (non-blocking)
      const analyticsPanel = document.getElementById('viewAnalyticsPanel');
      if (analyticsPanel) {
        renderViewAnalytics(analyticsPanel, r.id).then(() => {
          // Update view count in meta bar
          const metaEl = document.getElementById('viewCountMeta');
          if (metaEl) {
            fetch(`/api/analytics/${encodeURIComponent(r.id)}`)
              .then(resp => resp.ok ? resp.json() : null)
              .then(data => {
                if (data) metaEl.innerHTML = `${icons.eye} ${data.total_views}`;
              })
              .catch(() => {});
          }
        });
      }

      // Load video comments panel (non-blocking)
      setupVideoCommentsPanel();
    }

    // --- Share link button (copy to clipboard) ---
    // Uses share_token for public URLs to prevent ID enumeration
    function setupShareButton() {
      const btn = document.getElementById('btnShareLink');
      if (!btn || !currentData) return;

      btn.addEventListener('click', () => {
        // Use share_token for public report URL, fall back to recording ID
        const token = currentData.recording.share_token;
        const publicId = token || recordingId;
        const url = `${location.origin}/report/${encodeURIComponent(publicId)}`;
        navigator.clipboard.writeText(url).then(() => {
          const orig = btn.innerHTML;
          btn.innerHTML = `${icons.checkCircle} ${t('copied', 'Copied')}`;
          setTimeout(() => { btn.innerHTML = orig; }, 2000);
        }).catch(() => {
          prompt('Copy link:', url);
        });
      });
    }

    // --- Embed button ---
    // Uses share_token for public embed URLs
    function setupEmbedButton() {
      const btn = document.getElementById('btnEmbed');
      if (!btn || !currentData) return;
      btn.addEventListener('click', () => {
        // Pass share_token for public embed URLs
        const token = currentData.recording.share_token;
        const publicId = token || recordingId;
        showEmbedModal(publicId);
      });
    }

    // --- Password protection panel ---
    function setupPasswordPanel(recording) {
      const btn = document.getElementById('btnPassword');
      const panel = document.getElementById('passwordPanel');
      const btnClose = document.getElementById('btnClosePassword');
      if (!btn || !panel) return;

      btn.addEventListener('click', () => {
        panel.classList.toggle('hidden');
      });

      if (btnClose) {
        btnClose.addEventListener('click', () => {
          panel.classList.add('hidden');
        });
      }

      // Change password button (when password is already set)
      const btnChange = document.getElementById('btnChangePassword');
      const changeForm = document.getElementById('changePasswordForm');
      if (btnChange && changeForm) {
        btnChange.addEventListener('click', () => {
          changeForm.classList.toggle('hidden');
          const input = document.getElementById('newPasswordInput');
          if (input) setTimeout(() => input.focus(), 100);
        });
      }

      // Remove password
      const btnRemove = document.getElementById('btnRemovePassword');
      if (btnRemove) {
        btnRemove.addEventListener('click', async () => {
          btnRemove.disabled = true;
          btnRemove.textContent = t('removing', 'Removing...');
          const status = document.getElementById('passwordStatus');
          try {
            await removeRecordingPassword(recordingId);
            const data = await getRecording(recordingId);
            currentData = data;
            render(data);
          } catch (err) {
            if (status) {
              status.textContent = t('error', 'Error') + ': ' + err.message;
              status.style.color = 'var(--red)';
              status.classList.remove('hidden');
            }
            btnRemove.disabled = false;
            btnRemove.textContent = t('remove_password', 'Remove password');
          }
        });
      }

      // Save new password (set or change)
      const btnSave = document.getElementById('btnSaveNewPassword');
      const passwordInput = document.getElementById('newPasswordInput');
      if (btnSave && passwordInput) {
        const handleSave = async () => {
          const password = passwordInput.value.trim();
          const status = document.getElementById('passwordStatus');

          if (!password || password.length < 4) {
            if (status) {
              status.textContent = t('password_too_short', 'Password must be at least 4 characters');
              status.style.color = 'var(--amber)';
              status.classList.remove('hidden');
            }
            return;
          }

          btnSave.disabled = true;
          btnSave.textContent = t('saving', 'Saving...');

          try {
            await setRecordingPassword(recordingId, password);
            const data = await getRecording(recordingId);
            currentData = data;
            render(data);
          } catch (err) {
            if (status) {
              status.textContent = t('error', 'Error') + ': ' + err.message;
              status.style.color = 'var(--red)';
              status.classList.remove('hidden');
            }
            btnSave.disabled = false;
            btnSave.textContent = recording.has_password ? t('save', 'Save') : t('set_password', 'Set password');
          }
        };

        btnSave.addEventListener('click', handleSave);
        passwordInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            handleSave();
          }
        });
      }
    }

    // --- YouTrack section rendering (4 states) ---
    function renderYouTrackSection(r, card) {
      // State A: Already sent to YouTrack
      if (card?.youtrack_issue_id) {
        return `<a href="${config_youtrackUrl}/issue/${card.youtrack_issue_id}" target="_blank" class="detail-meta-item yt-exported">${icons.checkCircle} ${escapeHTML(card.youtrack_issue_id)}</a>`;
      }

      // State B: Pre-linked, card exists → ready for review
      if (r.pending_youtrack_issue_id && card) {
        return `<div class="yt-prelinked" style="margin-left:auto; display:flex; gap:8px; align-items:center;">
          <a href="${config_youtrackUrl}/issue/${r.pending_youtrack_issue_id}" target="_blank" class="detail-meta-item yt-pending">${icons.clock} ${escapeHTML(r.pending_youtrack_issue_id)}</a>
          <button class="btn btn-sm btn-primary" id="btnSendPreLinked" style="gap:6px;">${icons.send} ${t('yt_send', 'Send')}</button>
          <button class="btn btn-sm" id="btnClearPreLink" title="Unlink">&times;</button>
        </div>`;
      }

      // State C: Pre-linked, still processing → show pre-link badge
      if (r.pending_youtrack_issue_id && !card) {
        return `<div class="yt-prelinked" style="margin-left:auto; display:flex; gap:8px; align-items:center;">
          <span class="detail-meta-item yt-pending">${icons.clock} ${escapeHTML(r.pending_youtrack_issue_id)} (processing...)</span>
          <button class="btn btn-sm" id="btnClearPreLink" title="Unlink">&times;</button>
        </div>`;
      }

      // State D: No link — show tracker dropdown (during processing OR after)
      // Only show if a tracker is configured
      if (r.status !== 'error' && trackerConfigured) {
        const showCreateNew = !!card; // only show "create new" if card exists
        return `<div class="yt-dropdown" style="margin-left:auto;">
          <button class="btn btn-sm btn-primary" id="btnYouTrack" style="gap:6px;">${icons.externalLink} YouTrack</button>
          <div class="yt-popover hidden" id="ytPopover">
            <div class="yt-popover-header">
              <input type="text" id="ytSearch" placeholder="${t('yt_search_placeholder', 'Search by ID or title...')}" autocomplete="off" />
            </div>
            <div class="yt-popover-filters">
              <select id="ytAuthorFilter"></select>
              <select id="ytProjectFilter">
                <option value="">${t('yt_all_projects', 'All projects')}</option>
              </select>
              <select id="ytStateFilter">
                <option value="">${t('yt_all_unresolved', 'All unresolved')}</option>
                <option value="In Review">In Review</option>
                <option value="Open">Open</option>
                <option value="Reopened">Reopened</option>
                <option value="In Progress">In Progress</option>
                <option value="*">${t('yt_all_incl_resolved', 'All (incl. resolved)')}</option>
              </select>
            </div>
            <div class="yt-popover-list" id="ytIssueList"></div>
            ${showCreateNew ? `<div class="yt-popover-footer">
              <div class="yt-export-meta" id="ytExportMeta"></div>
              <button class="btn btn-sm" id="ytCreateNew">${icons.send} ${t('yt_create_new', 'Create new issue')}</button>
            </div>` : ''}
          </div>

    // --- Pipeline status rendering ---
    const PIPELINE_STEPS = [
      { key: 'uploaded', doing: t('extracting_audio', 'Extracting audio from video...') },
      { key: 'audio_extracted', doing: t('extracting_audio', 'Extracting audio from video...') },
      { key: 'transcribing', doing: t('transcribing_speech', 'Transcribing speech...') },
      { key: 'transcribed', doing: t('analyzing_transcript', 'Analyzing transcript...') },
      { key: 'analyzed', doing: t('extracting_frames', 'Extracting key frames...') },
      { key: 'frames_extracted', doing: t('creating_card', 'Creating card...') },
      { key: 'complete', doing: t('done', 'Done') },
    ];

    function renderPipelineStatus(status) {
      const step = PIPELINE_STEPS.find(s => s.key === status);
      return step?.doing || status;
    }

    function renderPipelineProgress(status) {
      const idx = PIPELINE_STEPS.findIndex(s => s.key === status);
      const total = PIPELINE_STEPS.length - 1; // exclude 'complete'
      const pct = Math.round((Math.max(idx, 0) / total) * 100);
      return `<div class="processing-bar"><div class="processing-bar-fill" style="width:${pct}%"></div></div>
              <div class="processing-bar-label">${Math.max(idx, 0) + 1} / ${total}</div>`;
    }

    // Auto-refresh while processing — update only the banner, not the whole page
    let refreshTimer = null;
    let lastStatus = null;
    function startAutoRefresh() {
      if (refreshTimer) return;
      refreshTimer = setInterval(async () => {
        try {
          const data = await getRecording(recordingId);
          const newStatus = data.recording.status;
          if (newStatus === 'complete' || newStatus === 'error') {
            // Pipeline finished — full re-render to show card, analysis, etc.
            clearInterval(refreshTimer);
            refreshTimer = null;
            currentData = data;
            render(data);
            return;
          }
          if (newStatus !== lastStatus) {
            // Status changed but still processing — update only the banner
            lastStatus = newStatus;
            const banner = document.getElementById('processingBanner');
            if (banner) {
              banner.querySelector('.processing-banner-status').textContent = renderPipelineStatus(newStatus);
              banner.querySelector('.processing-progress').innerHTML = renderPipelineProgress(newStatus);
            }
          }
        } catch {}
      }, 3000);
    }

    // --- Analysis fields by type ---
    function renderAnalysisFields(a) {
      const field = (title, text) => text ? `<div class="analysis-field"><h4>${title}</h4><p>${escapeHTML(text)}</p></div>` : '';
      const list = (title, items) => items?.length ? `<div class="analysis-field"><h4>${title}</h4><ol class="analysis-steps">${items.map(s => `<li>${escapeHTML(s)}</li>`).join('')}</ol></div>` : '';
      const bullets = (title, items) => items?.length ? `<div class="analysis-field"><h4>${title}</h4><ul style="margin:0;padding-left:18px;">${items.map(s => `<li>${escapeHTML(s)}</li>`).join('')}</ul></div>` : '';

      const type = a.type || 'bug';
      let html = '';

      if (type === 'bug') {
        html += list(t('steps_to_reproduce', 'Steps to Reproduce'), a.steps);
        html += field(t('expected_result', 'Expected Result'), a.expected);
        html += field(t('actual_result', 'Actual Result'), a.actual);
      } else if (type === 'feature') {
        html += field(t('proposal', 'Proposal'), a.proposal);
        html += field(t('use_case', 'Use Case'), a.use_case);
      } else if (type === 'enhancement') {
        html += field(t('current_behavior', 'Current Behavior'), a.current_behavior);
        html += field(t('proposed_change', 'Proposed Change'), a.proposed_change);
      } else if (type === 'demo') {
        html += bullets(t('key_points', 'Key Points'), a.key_points);
        html += field(t('details', 'Details'), a.details);
      }

      // Fallback: if GPT returned old-style fields, show them
      if (!html && a.steps?.length) {
        html += list(t('steps_to_reproduce', 'Steps'), a.steps);
        html += field(t('expected_result', 'Expected'), a.expected);
        html += field(t('actual_result', 'Actual'), a.actual);
      }

      html += field(t('context', 'Context'), a.context);
      return html;
    }

    // --- Transcript rendering ---
    function renderTranscript(transcript) {
      if (transcript.words && transcript.words.length) {
        return transcript.words.map(w =>
          `<span class="transcript-word" data-start="${w.start}" data-end="${w.end}">${escapeHTML(w.word)}</span>`
        ).join(' ');
      }
      return `<p>${escapeHTML(transcript.text || '')}</p>`;
    }

    // --- Context tab rendering ---
    function renderContextTab(recording) {
      let html = '';

      // Environment
      const meta = recording.metadata;
      if (meta) {
        const ua = meta.userAgent || '';
        const chromeMatch = ua.match(/Chrome\/([\d.]+)/);
        const browser = chromeMatch ? `Chrome ${chromeMatch[1].split('.')[0]}` : 'Unknown';
        const macMatch = ua.match(/Mac OS X ([\d_]+)/);
        const winMatch = ua.match(/Windows NT ([\d.]+)/);
        const os = macMatch ? `macOS ${macMatch[1].replace(/_/g, '.')}` : winMatch ? 'Windows' : 'Unknown';
        const sw = meta.screenWidth || meta.screen?.width;
        const sh = meta.screenHeight || meta.screen?.height;
        const dpr = meta.devicePixelRatio || meta.screen?.devicePixelRatio;

        html += `<div class="context-section">
          <h4 class="context-section-title">${icons.cards} ${t('env_environment', 'Environment')}</h4>
          <div class="context-env">
            <span class="context-env-item">${escapeHTML(browser)}</span>
            <span class="context-env-item">${escapeHTML(os)}</span>
            ${sw && sh ? `<span class="context-env-item">${sw}&times;${sh}${dpr > 1 ? ` @${dpr}x` : ''}</span>` : ''}
            ${meta.language ? `<span class="context-env-item">${escapeHTML(meta.language)}</span>` : ''}
          </div>
        </div>`;

        // CRM Profile (who was testing)
        if (meta.crmProfile) {
          const p = meta.crmProfile;
          const items = [
            p.name ? `<span class="context-env-item" title="User">${escapeHTML(p.name)}</span>` : '',
            p.email ? `<span class="context-env-item" title="Email">${escapeHTML(p.email)}</span>` : '',
            p.user_id ? `<span class="context-env-item" title="User ID">user: ${escapeHTML(String(p.user_id))}</span>` : '',
            p.account_id ? `<span class="context-env-item" title="Account ID">account: ${escapeHTML(String(p.account_id))}</span>` : '',
            p.source ? `<span class="context-env-item" title="Source">${escapeHTML(p.source)}</span>` : '',
          ].filter(Boolean).join('');
          html += `<div class="context-section">
            <h4 class="context-section-title">${icons.user} ${t('env_crm_profile', 'CRM Profile')}</h4>
            <div class="context-env">${items}</div>
          </div>`;
        }
      }

      // URL Events
      const urlEvents = recording.url_events || [];
      if (urlEvents.length > 0) {
        html += `<div class="context-section">
          <h4 class="context-section-title">${icons.externalLink} ${t('env_pages_visited', 'Pages visited')} (${urlEvents.length})</h4>
          <div class="context-list">`;
        for (const ev of urlEvents) {
          const mins = Math.floor(ev.ts / 60);
          const secs = Math.floor(ev.ts % 60);
          const time = `${mins}:${String(secs).padStart(2, '0')}`;
          const typeBadge = ev.type === 'initial' ? 'initial' : ev.type === 'tab_switch' ? 'tab' : 'nav';
          let displayUrl = ev.url;
          try { displayUrl = new URL(ev.url).pathname + new URL(ev.url).search; } catch {}
          if (displayUrl.length > 60) displayUrl = displayUrl.slice(0, 57) + '...';
          html += `<div class="context-event context-event-url" data-time="${ev.ts}">
            <span class="context-time">${time}</span>
            <span class="context-badge context-badge-${typeBadge}">${typeBadge}</span>
            <span class="context-url" title="${escapeHTML(ev.url)}">${escapeHTML(ev.title || displayUrl)}</span>
          </div>`;
        }
        html += `</div></div>`;
      }

      // Console Events
      const consoleEvents = recording.console_events || [];
      if (consoleEvents.length > 0) {
        html += `<div class="context-section">
          <h4 class="context-section-title">${icons.alertTriangle} ${t('env_console', 'Console')} (${consoleEvents.length})</h4>
          <div class="context-list">`;
        for (const ev of consoleEvents) {
          const mins = Math.floor(ev.ts / 60);
          const secs = Math.floor(ev.ts % 60);
          const time = `${mins}:${String(secs).padStart(2, '0')}`;
          const levelClass = ev.level === 'error' ? 'error' : 'warning';
          html += `<div class="context-event context-event-${levelClass}" data-time="${ev.ts}">
            <span class="context-time">${time}</span>
            <span class="context-badge context-badge-${levelClass}">${ev.level}</span>
            <span class="context-text" title="${escapeHTML(ev.stack || ev.text)}">${escapeHTML(ev.text)}</span>
            ${ev.source && ev.source !== 'unknown' ? `<span class="context-source">${escapeHTML(ev.source)}</span>` : ''}
          </div>`;
        }
        html += `</div></div>`;
      }

      // Action Events
      const actionEvents = recording.action_events || [];
      if (actionEvents.length > 0) {
        const ACTION_ICONS = { click: '🖱', modal_open: '📂', modal_close: '📁', form_submit: '📤' };
        const ACTION_LABELS = { click: 'click', modal_open: 'open', modal_close: 'close', form_submit: 'submit' };
        html += `<div class="context-section">
          <h4 class="context-section-title">${icons.activity} ${t('env_actions', 'Actions')} (${actionEvents.length})</h4>
          <div class="context-list">`;
        for (const ev of actionEvents) {
          const mins = Math.floor(ev.ts / 60);
          const secs = Math.floor(ev.ts % 60);
          const time = `${mins}:${String(secs).padStart(2, '0')}`;
          const typeClass = ev.eventType === 'modal_open' || ev.eventType === 'modal_close' ? 'nav' : ev.eventType === 'form_submit' ? 'warning' : 'initial';
          const label = ACTION_LABELS[ev.eventType] || ev.eventType;
          const displayId = ev.id || (ev.role ? `[${ev.role}]` : '');
          const title = [ev.path, ev.ariaLabel, ev.text].filter(Boolean).join(' | ');
          const displayText = ev.ariaLabel || ev.text || ev.path.split('>').pop().trim() || ev.tag;
          html += `<div class="context-event context-event-url" data-time="${ev.ts}" title="${escapeHTML(title)}">
            <span class="context-time">${time}</span>
            <span class="context-badge context-badge-${typeClass}">${label}</span>
            <span class="context-url">${escapeHTML(displayText.slice(0, 50))}</span>
            ${displayId ? `<span class="context-source">${escapeHTML(displayId)}</span>` : ''}
            <span class="context-source" style="font-family:monospace;opacity:0.5;">${escapeHTML(ev.path.split('>').pop().trim().slice(0, 30))}</span>
          </div>`;
        }
        html += `</div></div>`;
      }

      if (!html) {
        html = `<div class="text-dim">${t('no_context', 'No context data captured. Update Chrome extension to capture URL events and console errors.')}</div>`;
      }

      return html;
    }

    // --- Key Frames Index ---
    function setupKeyframesIndex(frames) {
      const list = document.getElementById('keyframesList');
      const video = document.getElementById('videoPlayer');
      if (!list || !video) return;

      // Click on keyframe item → seek video
      list.querySelectorAll('.keyframe-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.keyframe-delete')) return;
          const time = parseFloat(item.dataset.time);
          video.currentTime = time;
          video.play();
          highlightKeyframe(parseInt(item.dataset.frameId));
        });
      });

      // Delete buttons
      list.querySelectorAll('.keyframe-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const frameId = parseInt(btn.dataset.frameId);
          const status = document.getElementById('timelineStatus');
          try {
            if (status) status.textContent = t('deleting', 'Deleting...');
            await deleteKeyframe(recordingId, frameId);
            const data = await getRecording(recordingId);
            currentData = data;
            render(data);
          } catch (err) {
            if (status) status.textContent = t('status_error', 'Error') + ': ' + err.message;
          }
        });
      });
    }

    function highlightKeyframe(frameId) {
      const list = document.getElementById('keyframesList');
      if (!list) return;
      list.querySelectorAll('.keyframe-item').forEach(item => {
        const isActive = parseInt(item.dataset.frameId) === frameId;
        item.classList.toggle('active', isActive);
        if (isActive) {
          item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      });
    }

    // --- Video, timeline, frame/transcript interactions ---
    function setupVideoInteractions(frames, transcript) {
      const video = document.getElementById('videoPlayer');
      if (!video) return;

      // Timeline
      const timelineContainer = document.getElementById('timelineContainer');
      if (timelineContainer) {
        const duration = currentData.recording.duration_seconds || 60;
        timeline = createTimeline({
          container: timelineContainer,
          videoElement: video,
          frames: frames,
          duration: duration,
          recordingId: recordingId,
          editable: true,
          onKeyframeChange: async (frameId, newTime) => {
            const status = document.getElementById('timelineStatus');
            try {
              status.textContent = t('saving', 'Saving...');
              const allFrames = timeline.getFrames();
              await updateKeyframes(recordingId, allFrames.map(f => ({ id: f.id, time_seconds: f.time_seconds })));
              status.textContent = t('saved', 'Saved');
              setTimeout(() => { status.textContent = ''; }, 2000);
            } catch (err) {
              status.textContent = t('status_error', 'Error') + ': ' + err.message;
            }
          },
          onKeyframeSelect: (frameId, time) => {
            highlightKeyframe(frameId);
          },
          onKeyframeDelete: async (frameId) => {
            const status = document.getElementById('timelineStatus');
            try {
              if (status) status.textContent = t('deleting', 'Deleting...');
              await deleteKeyframe(recordingId, frameId);
              const data = await getRecording(recordingId);
              currentData = data;
              render(data);
            } catch (err) {
              if (status) status.textContent = t('status_error', 'Error') + ': ' + err.message;
            }
          },
          onKeyframeAdd: async (time) => {
            const status = document.getElementById('timelineStatus');
            try {
              status.textContent = t('extracting_frame', 'Extracting frame...');
              const result = await addKeyframe(recordingId, time, '');
              // Reload to show new thumbnail on timeline + in frames tab
              const data = await getRecording(recordingId);
              currentData = data;
              render(data);
            } catch (err) {
              status.textContent = t('status_error', 'Error') + ': ' + err.message;
            }
          },
        });
      }

      // Transcript word click → seek video
      const transcriptBox = document.getElementById('transcriptBox');
      if (transcriptBox) {
        transcriptBox.querySelectorAll('.transcript-word').forEach(word => {
          word.addEventListener('click', () => {
            video.currentTime = parseFloat(word.dataset.start);
            video.play();
          });
        });

        if (transcript.words && transcript.words.length) {
          video.addEventListener('timeupdate', () => {
            const ct = video.currentTime;
            transcriptBox.querySelectorAll('.transcript-word').forEach(word => {
              const s = parseFloat(word.dataset.start);
              const e = parseFloat(word.dataset.end);
              word.classList.toggle('active', ct >= s && ct <= e);
            });
          });
        }
      }

      // URL bar sync
      const urlBar = document.getElementById('urlBar');
      const urlBarText = document.getElementById('urlBarText');
      const urlEvents = currentData.recording.url_events || [];

      if (urlBar && urlEvents.length > 0) {
        urlBar.classList.remove('hidden');
        urlBarText.textContent = urlEvents[0].url;

        video.addEventListener('timeupdate', () => {
          const ct = video.currentTime;
          let currentUrl = urlEvents[0];
          for (const ev of urlEvents) {
            if (ev.ts <= ct) currentUrl = ev;
            else break;
          }
          if (currentUrl) {
            urlBarText.textContent = currentUrl.url;
            urlBarText.title = currentUrl.title || currentUrl.url;
          }
        });
      }

      // Context events click → seek video
      document.querySelectorAll('.context-event[data-time]').forEach(el => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => {
          video.currentTime = parseFloat(el.dataset.time);
          video.play();
        });
      });
    }

    // --- Description edit modal ---
    function setupDescriptionEdit(card) {
      const btnEdit = document.getElementById('btnEditDesc');
      const modal = document.getElementById('descModal');
      const btnClose = document.getElementById('btnCloseDescModal');
      const btnSave = document.getElementById('btnSaveDesc');
      const btnCancel = document.getElementById('btnCancelDesc');
      if (!btnEdit || !modal) return;

      function openModal() {
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        const titleEl = document.getElementById('editTitle');
        if (titleEl) setTimeout(() => titleEl.focus(), 100);
      }

      function closeModal() {
        modal.classList.add('hidden');
        document.body.style.overflow = '';
      }

      btnEdit.addEventListener('click', openModal);
      btnClose.addEventListener('click', closeModal);
      btnCancel.addEventListener('click', closeModal);

      // Close on overlay click
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      // Close on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
      });

      btnSave.addEventListener('click', async () => {
        const fields = {};

        const typeEl = document.getElementById('editType');

        if (typeEl) fields.type = typeEl.value;
        if (descEl) fields.description = descEl.value;

        btnSave.disabled = true;
        btnSave.textContent = 'Saving...';

          await updateCard(card.id, fields);

          btnSave.textContent = 'Save';

      });

    // --- Transcript word-level inline edit ---
    function setupTranscriptEdit(transcript) {
      const btnEdit = document.getElementById('btnEditTranscript');
      const tView = document.getElementById('transcriptView');
      const tEdit = document.getElementById('transcriptEdit');
      const btnSave = document.getElementById('btnSaveTranscript');
      const btnCancel = document.getElementById('btnCancelTranscript');
      const wordsEditor = document.getElementById('wordsEditor');
      if (!btnEdit || !tView || !tEdit || !wordsEditor) return;

      let editWords = [];

      btnEdit.addEventListener('click', () => {
        editWords = (transcript.words || []).map(w => ({ ...w }));
        renderWordsEditor();
        tView.classList.add('hidden');
        tEdit.classList.remove('hidden');
        btnEdit.classList.add('hidden');
      });

      function renderWordsEditor() {
        // Group words into segments of ~3 seconds
        const SEGMENT_DURATION = 3;
        const segments = [];
        let currentSegment = { start: 0, words: [] };
        for (const w of editWords) {
          if (currentSegment.words.length > 0 && w.start - currentSegment.start >= SEGMENT_DURATION) {
            segments.push(currentSegment);
            currentSegment = { start: w.start, words: [] };
          }
          if (currentSegment.words.length === 0) currentSegment.start = w.start;
          currentSegment.words.push(w);
        }
        if (currentSegment.words.length > 0) segments.push(currentSegment);

        wordsEditor.innerHTML = segments.map((seg, si) => {
          const time = formatTimecode(seg.start);
          const wordsHtml = seg.words.map((w, wi) => {
            const globalIdx = editWords.indexOf(w);
            return `<span class="word-edit-chip" contenteditable="true" data-idx="${globalIdx}">${escapeHTML(w.word)}</span>`;
          }).join('');
          return `<div class="word-segment">
            <span class="word-segment-time">${time}</span>
            <div class="word-segment-words">${wordsHtml}</div>
          </div>`;
        }).join('');

        // Listen for edits
        wordsEditor.querySelectorAll('.word-edit-chip').forEach(chip => {
          chip.addEventListener('blur', () => {
            const idx = parseInt(chip.dataset.idx);
            if (editWords[idx]) editWords[idx].word = chip.textContent.trim();
          });
          chip.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); chip.blur(); }
          });
        });
      }

      btnCancel.addEventListener('click', () => {
        tEdit.classList.add('hidden');
        tView.classList.remove('hidden');
        btnEdit.classList.remove('hidden');
      });

      btnSave.addEventListener('click', async () => {
        // Collect final word values from chips
        wordsEditor.querySelectorAll('.word-edit-chip').forEach(chip => {
          const idx = parseInt(chip.dataset.idx);
          if (editWords[idx]) editWords[idx].word = chip.textContent.trim();
        });

        btnSave.disabled = true;
        btnSave.textContent = 'Saving...';

        try {
          await updateTranscript(recordingId, editWords);
          const data = await getRecording(recordingId);
          currentData = data;
          render(data);
        } catch (err) {
          alert('Error: ' + err.message);
          btnSave.disabled = false;
          btnSave.textContent = 'Save';
        }
      });
    }

    // --- Context column edit (delete items) ---
    function setupContextEdit(recording) {
      const btnEdit = document.getElementById('btnEditContext');
      const cView = document.getElementById('contextView');
      const cEdit = document.getElementById('contextEdit');
      const cList = document.getElementById('contextEditList');
      const btnSave = document.getElementById('btnSaveContext');
      const btnCancel = document.getElementById('btnCancelContext');
      if (!btnEdit || !cView || !cEdit) return;

      let editUrlEvents, editConsoleEvents, editActionEvents;

      btnEdit.addEventListener('click', () => {
        editUrlEvents = [...(recording.url_events || [])];
        editConsoleEvents = [...(recording.console_events || [])];
        editActionEvents = [...(recording.action_events || [])];
        renderContextEditor();
        cView.classList.add('hidden');
        cEdit.classList.remove('hidden');
        btnEdit.classList.add('hidden');
      });

      function renderContextEditor() {
        let html = '';

        if (editUrlEvents.length > 0) {
          html += `<div class="context-edit-section">
            <h4 class="context-section-title">${icons.externalLink} Pages (${editUrlEvents.length})</h4>
            ${editUrlEvents.map((ev, i) => {
              const time = formatTimecode(ev.ts);
              let displayUrl = ev.url;
              try { displayUrl = new URL(ev.url).pathname; } catch {}
              return `<div class="context-edit-item" data-type="url" data-idx="${i}">
                <span class="context-time">${time}</span>
                <span class="context-edit-text">${escapeHTML(ev.title || displayUrl)}</span>
                <button class="context-delete-btn" data-type="url" data-idx="${i}">${icons.x}</button>
              </div>`;
            }).join('')}
          </div>`;
        }

        if (editConsoleEvents.length > 0) {
          html += `<div class="context-edit-section">
            <h4 class="context-section-title">${icons.alertTriangle} Console (${editConsoleEvents.length})</h4>
            ${editConsoleEvents.map((ev, i) => {
              const time = formatTimecode(ev.ts);
              return `<div class="context-edit-item" data-type="console" data-idx="${i}">
                <span class="context-time">${time}</span>
                <span class="context-badge context-badge-${ev.level === 'error' ? 'error' : 'warning'}">${ev.level}</span>
                <span class="context-edit-text">${escapeHTML(ev.text)}</span>
                <button class="context-delete-btn" data-type="console" data-idx="${i}">${icons.x}</button>
              </div>`;
            }).join('')}
          </div>`;
        }

        if (editActionEvents.length > 0) {
          const ACTION_LABELS = { click: 'click', modal_open: 'open', modal_close: 'close', form_submit: 'submit' };
          html += `<div class="context-edit-section">
            <h4 class="context-section-title">${icons.activity} Actions (${editActionEvents.length})</h4>
            ${editActionEvents.map((ev, i) => {
              const time = formatTimecode(ev.ts);
              const label = ACTION_LABELS[ev.eventType] || ev.eventType;
              const displayText = ev.ariaLabel || ev.text || ev.path?.split('>').pop().trim() || ev.tag;
              return `<div class="context-edit-item" data-type="action" data-idx="${i}">
                <span class="context-time">${time}</span>
                <span class="context-badge context-badge-initial">${label}</span>
                <span class="context-edit-text">${escapeHTML(displayText?.slice(0, 40) || '')}</span>
                <button class="context-delete-btn" data-type="action" data-idx="${i}">${icons.x}</button>
              </div>`;
            }).join('')}
          </div>`;
        }

        if (!html) html = '<div class="text-dim">No data to edit</div>';
        cList.innerHTML = html;

        // Wire delete buttons
        cList.querySelectorAll('.context-delete-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const type = btn.dataset.type;
            const idx = parseInt(btn.dataset.idx);
            if (type === 'url') editUrlEvents.splice(idx, 1);
            else if (type === 'console') editConsoleEvents.splice(idx, 1);
            else if (type === 'action') editActionEvents.splice(idx, 1);
            renderContextEditor();
          });
        });
      }

      btnCancel.addEventListener('click', () => {
        cEdit.classList.add('hidden');
        cView.classList.remove('hidden');
        btnEdit.classList.remove('hidden');
      });

      btnSave.addEventListener('click', async () => {
        btnSave.disabled = true;
        btnSave.textContent = 'Saving...';

        try {
          await updateContext(recordingId, {
            url_events: editUrlEvents,
            console_events: editConsoleEvents,
            action_events: editActionEvents,
          });
          const data = await getRecording(recordingId);
          currentData = data;
          render(data);
        } catch (err) {
          alert('Error: ' + err.message);
          btnSave.disabled = false;
          btnSave.textContent = 'Save';
        }
      });
    }

    // --- YouTrack panel (search + link + create + pre-link) ---
    function setupYoutrackPanel(recording, card) {
      const author = recording.author;
      const cardId = card?.id;
      const isPreLinkMode = !card; // no card yet = pre-link mode

      // Handle pre-linked review state (State B: pre-linked + card exists)
      const btnSend = document.getElementById('btnSendPreLinked');
      const btnClear = document.getElementById('btnClearPreLink');

      if (btnSend && recording.pending_youtrack_issue_id && cardId) {
        btnSend.addEventListener('click', async () => {
          btnSend.disabled = true;
          btnSend.innerHTML = 'Sending...';
          try {
            await linkToYoutrack(cardId, recording.pending_youtrack_issue_id);
            const data = await getRecording(recordingId);
            currentData = data;
            render(data);
          } catch (err) {
            btnSend.disabled = false;
            btnSend.innerHTML = `${icons.send} Send`;
            alert('Error: ' + err.message);
          }
        });
      }

      if (btnClear) {
        btnClear.addEventListener('click', async () => {
          try {
            await clearPreLink(recordingId);
            const data = await getRecording(recordingId);
            currentData = data;
            render(data);
          } catch (err) {
            alert('Error: ' + err.message);
          }
        });
      }

      // YouTrack dropdown popover (States C & D)
      setupYoutrackPopover(author, cardId, isPreLinkMode);
    }

    function setupYoutrackPopover(author, cardId, isPreLinkMode) {
      const btn = document.getElementById('btnYouTrack');
      const popover = document.getElementById('ytPopover');
      if (!btn || !popover) return;

      const searchInput = document.getElementById('ytSearch');
      const authorFilter = document.getElementById('ytAuthorFilter');
      const projectFilter = document.getElementById('ytProjectFilter');
      const stateFilter = document.getElementById('ytStateFilter');
      const issueList = document.getElementById('ytIssueList');
      const createNewBtn = document.getElementById('ytCreateNew');
      let usersLoaded = false;

      let resolvedReporter = null; // Will be set after loadUsers resolves

      // Populate author dropdown from youtrack_users
      async function loadUsers() {
        if (usersLoaded) return;
        try {
          const res = await fetch('/api/youtrack-users');
          const data = await res.json();
          const users = data.users || [];
          // Deduplicate by youtrack_login
          const seen = new Set();
          const unique = [];
          for (const u of users) {
            if (!seen.has(u.youtrack_login)) {
              seen.add(u.youtrack_login);
              unique.push(u);
            }
          }
          // Match recording author to youtrack user (by login, author name, or display name)
          const matchedUser = unique.find(u =>
            u.youtrack_login === author || u.author === author || u.youtrack_name === author
          );
          resolvedReporter = matchedUser || null;

          authorFilter.innerHTML = '<option value="">All users</option>'
            + unique.map(u => {
              const isSelected = matchedUser ? u.youtrack_login === matchedUser.youtrack_login : false;
              return `<option value="${escapeHTML(u.youtrack_login)}" ${isSelected ? 'selected' : ''}>${escapeHTML(u.youtrack_name || u.youtrack_login)}</option>`;
            }).join('');
          usersLoaded = true;
          updateExportMeta();
        } catch (e) {
          authorFilter.innerHTML = `<option value="${escapeHTML(author || '')}">${escapeHTML(author || 'All')}</option>`;
        }
      }

      // Show export metadata (project + reporter) under "Create new issue"
      function updateExportMeta() {
        const metaEl = document.getElementById('ytExportMeta');
        if (!metaEl) return;
        const project = projectFilter.value || 'BUG';
        const reporterName = resolvedReporter ? resolvedReporter.youtrack_name : null;
        if (reporterName) {
          metaEl.innerHTML = `<span style="color:var(--text3);font-size:0.75rem;">Project: <strong style="color:var(--text2);">${escapeHTML(project)}</strong> · Reporter: <strong style="color:var(--text2);">${escapeHTML(reporterName)}</strong></span>`;
        } else {
          metaEl.innerHTML = `<span style="color:var(--amber);font-size:0.75rem;">Author "${escapeHTML(author)}" not found. Issue will be created by API owner. Project: <strong>${escapeHTML(project)}</strong></span>`;
        }
      }

      // Toggle popover
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isHidden = popover.classList.contains('hidden');
        popover.classList.toggle('hidden');
        if (isHidden) {
          searchInput.value = '';
          searchInput.focus();
          loadUsers().then(loadIssues);
        }
      });

      // Close on outside click
      document.addEventListener('click', (e) => {
        if (!popover.contains(e.target) && !btn.contains(e.target)) {
          popover.classList.add('hidden');
        }
      });

      // Close on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') popover.classList.add('hidden');
      });

      // Search debounce
      let searchTimer;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadIssues, 400);
      });

      // Filter changes
      stateFilter.addEventListener('change', loadIssues);
      authorFilter.addEventListener('change', loadIssues);
      projectFilter.addEventListener('change', () => { loadIssues(); updateExportMeta(); });

      // Load issues from YouTrack
      async function loadIssues() {
        issueList.innerHTML = '<div class="yt-popover-loading"><div class="spinner-sm"></div></div>';

        try {
          const params = {};
          const stateVal = stateFilter.value;
          if (stateVal && stateVal !== '*') params.state = stateVal;
          if (stateVal === '*') params.all = '1';
          const q = searchInput.value.trim();
          if (q) params.q = q;
          const selectedAuthor = authorFilter.value;
          if (selectedAuthor) params.author = selectedAuthor;
          const selectedProject = projectFilter.value;
          if (selectedProject) params.project = selectedProject;

          const data = await searchYoutrackIssues(params);
          renderIssues(data.issues || []);
        } catch (err) {
          issueList.innerHTML = `<div class="yt-popover-empty">Error: ${escapeHTML(err.message)}</div>`;
        }
      }

      function renderIssues(issues) {
        if (!issues.length) {
          issueList.innerHTML = '<div class="yt-popover-empty">No issues found</div>';
          return;
        }

        issueList.innerHTML = issues.map(issue => `
          <div class="yt-issue-item" data-issue-id="${escapeHTML(issue.id)}">
            <span class="yt-issue-id">${escapeHTML(issue.id)}</span>
            <span class="yt-issue-summary" title="${escapeHTML(issue.summary)}">${escapeHTML(issue.summary)}</span>
            ${issue.state ? `<span class="yt-issue-state">${escapeHTML(issue.state)}</span>` : ''}
          </div>
        `).join('');

        issueList.querySelectorAll('.yt-issue-item').forEach(item => {
          item.addEventListener('click', () => {
            // Reset any other active confirmations
            issueList.querySelectorAll('.yt-issue-confirm').forEach(el => {
              el.classList.remove('yt-issue-confirm');
              el.querySelector('.yt-confirm-bar')?.remove();
              el.querySelectorAll('.yt-issue-id, .yt-issue-summary, .yt-issue-state').forEach(c => c.style.display = '');
            });

            const issueId = item.dataset.issueId;
            // Show inline confirmation
            item.classList.add('yt-issue-confirm');
            item.querySelectorAll('.yt-issue-id, .yt-issue-summary, .yt-issue-state').forEach(c => c.style.display = 'none');

            const bar = document.createElement('div');
            bar.className = 'yt-confirm-bar';
            bar.innerHTML = `
              <span class="yt-confirm-text">Link to <strong>${escapeHTML(issueId)}</strong>?</span>
              <button class="btn btn-sm btn-primary yt-confirm-yes">Link</button>
              <button class="btn btn-sm yt-confirm-no">Cancel</button>
            `;
            item.appendChild(bar);

            bar.querySelector('.yt-confirm-no').addEventListener('click', (e) => {
              e.stopPropagation();
              item.classList.remove('yt-issue-confirm');
              bar.remove();
              item.querySelectorAll('.yt-issue-id, .yt-issue-summary, .yt-issue-state').forEach(c => c.style.display = '');
            });

            bar.querySelector('.yt-confirm-yes').addEventListener('click', async (e) => {
              e.stopPropagation();
              bar.querySelector('.yt-confirm-yes').disabled = true;
              bar.querySelector('.yt-confirm-yes').textContent = 'Linking...';
              bar.querySelector('.yt-confirm-no').style.display = 'none';

              try {
                if (isPreLinkMode) {
                  await preLinkYoutrack(recordingId, issueId);
                } else {
                  await linkToYoutrack(cardId, issueId);
                }
                popover.classList.add('hidden');
                const data = await getRecording(recordingId);
                currentData = data;
                render(data);
              } catch (err) {
                bar.querySelector('.yt-confirm-yes').disabled = false;
                bar.querySelector('.yt-confirm-yes').textContent = 'Link';
                bar.querySelector('.yt-confirm-no').style.display = '';
                bar.querySelector('.yt-confirm-text').innerHTML = `<span style="color:var(--red);">${escapeHTML(err.message)}</span>`;
              }
            });
          });
        });
      }

      // Create new ticket — two-click: first shows confirm, second executes
      if (createNewBtn) {
        let createConfirmed = false;
        createNewBtn.addEventListener('click', async () => {
          if (!createConfirmed) {
            createConfirmed = true;
            createNewBtn.innerHTML = `${icons.checkCircle} Confirm creation`;
            createNewBtn.classList.add('btn-primary');
            setTimeout(() => {
              if (createConfirmed) {
                createConfirmed = false;
                createNewBtn.innerHTML = `${icons.send} Create new issue`;
                createNewBtn.classList.remove('btn-primary');
              }
            }, 4000);
            return;
          }

          createConfirmed = false;
          createNewBtn.disabled = true;
          createNewBtn.innerHTML = 'Creating...';

          try {
            const exportProject = projectFilter.value || undefined;
            await exportToYoutrack(cardId, { project: exportProject });
            popover.classList.add('hidden');
            const data = await getRecording(recordingId);
            currentData = data;
            render(data);
          } catch (err) {
            createNewBtn.disabled = false;
            createNewBtn.innerHTML = `${icons.send} Create new issue`;
            createNewBtn.classList.remove('btn-primary');
          }
        });
      }
    }

    // --- Video Comments Panel (dashboard with moderation) ---

    async function loadDashboardComments() {
      const list = document.getElementById('vCommentList');
      const countEl = document.getElementById('vCommentCount');
      if (!list) return;

      try {
        const data = await getVideoComments(recordingId);
        const comments = data.comments || [];
        countEl.textContent = `(${comments.length})`;

        if (comments.length === 0) {
          list.innerHTML = '<div class="text-dim" style="text-align:center;padding:12px;">No comments yet</div>';
          return;
        }

        list.innerHTML = comments.map(c => {
          const timecodeHTML = c.timecode_seconds != null
            ? `<span class="vc-timecode" data-time="${c.timecode_seconds}" style="display:inline-flex;align-items:center;gap:3px;background:var(--blue-dim);color:var(--blue);font-size:0.7rem;font-weight:600;padding:1px 7px;border-radius:4px;cursor:pointer;font-family:monospace;">${formatTimecode(c.timecode_seconds)}</span>`
            : '';
          return `
            <div style="padding:8px 12px;border-radius:var(--radius);display:flex;align-items:flex-start;gap:8px;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
                  <span style="font-weight:600;font-size:0.85rem;">${escapeHTML(c.author_name)}</span>
                  ${timecodeHTML}
                  <span style="font-size:0.75rem;color:var(--text3);">${timeAgo(c.created_at)}</span>
                </div>
                <div style="font-size:0.85rem;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;">${escapeHTML(c.text)}</div>
              </div>
              <button class="btn btn-sm vc-delete-btn" data-comment-id="${c.id}" title="Delete comment" style="flex-shrink:0;padding:4px 6px;opacity:0.4;">
                ${icons.x}
              </button>
            </div>
          `;
        }).join('');

        // Timecode click -> seek video
        list.querySelectorAll('.vc-timecode').forEach(el => {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            const video = document.getElementById('videoPlayer');
            if (video) {
              video.currentTime = parseFloat(el.dataset.time);
              video.play();
            }
          });
        });

        // Delete buttons
        list.querySelectorAll('.vc-delete-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Delete this comment?')) return;
            btn.disabled = true;
            try {
              await deleteVideoComment(recordingId, btn.dataset.commentId);
              await loadDashboardComments();
            } catch (err) {
              alert('Failed to delete: ' + err.message);
              btn.disabled = false;
            }
          });
        });
      } catch (err) {
        list.innerHTML = '<div class="text-dim" style="text-align:center;padding:12px;">Failed to load comments</div>';
      }
    }

    function setupVideoCommentsPanel() {
      loadDashboardComments();

      const authorInput = document.getElementById('vCommentAuthor');
      const textInput = document.getElementById('vCommentText');
      const timecodeCheck = document.getElementById('vCommentTimecodeCheck');
      const timecodePreview = document.getElementById('vCommentTimecodePreview');
      const submitBtn = document.getElementById('vCommentSubmit');
      const errorEl = document.getElementById('vCommentError');
      if (!submitBtn) return;

      // Restore saved name
      const savedName = localStorage.getItem('bugreel_comment_name');
      if (savedName && authorInput) authorInput.value = savedName;

      // Timecode preview
      const video = document.getElementById('videoPlayer');

      if (timecodeCheck) {
        timecodeCheck.addEventListener('change', () => {
          if (timecodeCheck.checked && video && timecodePreview) {
            timecodePreview.textContent = formatTimecode(video.currentTime);
            timecodePreview.style.display = '';
          } else if (timecodePreview) {
            timecodePreview.style.display = 'none';
          }
        });
      }

      if (video && timecodeCheck) {
        video.addEventListener('timeupdate', () => {
          if (timecodeCheck.checked && timecodePreview) {
            timecodePreview.textContent = formatTimecode(video.currentTime);
          }
        });
      }

      submitBtn.addEventListener('click', async () => {
        const authorName = authorInput?.value.trim();
        const text = textInput?.value.trim();
        if (errorEl) errorEl.style.display = 'none';

        if (!authorName) {
          if (errorEl) { errorEl.textContent = 'Please enter your name.'; errorEl.style.display = ''; }
          authorInput?.focus();
          return;
        }
        if (!text) {
          if (errorEl) { errorEl.textContent = 'Please enter a comment.'; errorEl.style.display = ''; }
          textInput?.focus();
          return;
        }

        const timecode = timecodeCheck?.checked && video ? video.currentTime : null;

        submitBtn.disabled = true;
        const origHTML = submitBtn.innerHTML;
        submitBtn.textContent = 'Posting...';

        try {
          await addVideoComment(recordingId, authorName, text, timecode);
          localStorage.setItem('bugreel_comment_name', authorName);
          if (textInput) textInput.value = '';
          if (timecodeCheck) timecodeCheck.checked = false;
          if (timecodePreview) timecodePreview.style.display = 'none';
          await loadDashboardComments();
        } catch (err) {
          const msg = err.message || 'Failed to post comment.';
          if (errorEl) {
            errorEl.textContent = msg.includes('429') ? 'Too many comments. Please wait.' : msg;
            errorEl.style.display = '';
          }
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = origHTML;
        }
      });

      // Ctrl+Enter to submit
      if (textInput) {
        textInput.addEventListener('keydown', (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitBtn.click();
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (recordingId) load();
    });
  </script>
