<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report - BugReel</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/i18n-dashboard.js"></script>
  <style>
    /* Report-specific gallery */
    .report-gallery {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .report-gallery::-webkit-scrollbar { height: 4px; }
    .report-gallery::-webkit-scrollbar-track { background: transparent; }
    .report-gallery::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .report-gallery-item {
      flex-shrink: 0;
      width: 160px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }
    .report-gallery-item:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
    }
    .report-gallery-item img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }
    .report-gallery-item .gallery-time {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .lightbox.visible { opacity: 1; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-caption {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .lightbox-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
    }

    /* --- Video Comments --- */
    .video-comments {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }
    .video-comments-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .video-comments-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .video-comments-header .comment-count {
      background: var(--surface2);
      color: var(--text3);
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .comment-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 20px;
    }
    .comment-form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
    .comment-form input[type="text"],
    .comment-form textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .comment-form input[type="text"]:focus,
    .comment-form textarea:focus {
      border-color: var(--blue);
    }
    .comment-form textarea {
      resize: vertical;
      min-height: 60px;
    }
    .comment-form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
    }
    .comment-timecode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }
    .comment-timecode-toggle input[type="checkbox"] {
      accent-color: var(--blue);
    }
    .comment-timecode-preview {
      background: var(--blue-dim);
      color: var(--blue);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .comment-form .btn-submit {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .comment-form .btn-submit:hover { opacity: 0.9; }
    .comment-form .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .comment-form-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 6px;
    }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .video-comment {
      padding: 12px 16px;
      border-radius: var(--radius);
      transition: background var(--transition);
    }
    .video-comment:hover {
      background: var(--surface);
    }
    .video-comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .video-comment-author {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
    }
    .video-comment-time {
      font-size: 0.75rem;
      color: var(--text3);
    }
    .video-comment-timecode {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--blue-dim);
      color: var(--blue);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      transition: background var(--transition);
    }
    .video-comment-timecode:hover {
      background: rgba(59, 130, 246, 0.25);
    }
    .video-comment-text {
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .comments-empty {
      text-align: center;
      color: var(--text3);
      font-size: 0.85rem;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <script type="module">
    import { getRecording, getRecordingByToken, videoUrl, frameUrl, getVideoComments, addVideoComment } from '../js/api.js';
    import {
      extractParam, formatDate, formatDuration, formatTimecode,
      renderDescription, escapeHTML, icons, timeAgo
    } from '../js/shared.js';
    import { createTimeline } from '../js/timeline.js';

    const t = window.__dashboardI18n?.t || ((k, f) => f || k);

    function formatFileSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / 1048576).toFixed(1)} MB`;
    }

    const content = document.getElementById('content');
    // URL param is now a share_token (UUID) — server redirects ID-based URLs to share_token
    const shareToken = extractParam('/report/');
    // Will be set after loading the recording (real recording ID for API calls)
    let recordingId = null;
    let lightboxFrames = [];
    let lightboxIndex = 0;

    if (!shareToken) {
      content.innerHTML = `<div class="empty-state">${icons.alertTriangle}<p>No recording ID in URL</p></div>`;
    }

    async function load() {
      try {
        // Try loading by share_token first, fall back to direct ID for backwards compat
        let data;
        try {
          data = await getRecordingByToken(shareToken);
        } catch (e) {
          // Fallback: maybe the URL still has a recording ID (before migration)
          data = await getRecording(shareToken);
        }
        // Use the real recording ID for all subsequent API calls
        recordingId = data.recording.id;
        render(data);
        document.title = data.card
          ? `${data.card.title} — BugReel`
          : `Report: ${recordingId}`;
      } catch (err) {
        content.innerHTML = `<div class="empty-state">${icons.alertTriangle}<p>Failed to load: ${escapeHTML(err.message)}</p></div>`;
      }
    }

    function render({ recording, frames, card }) {
      const r = recording;
      const analysis = r.analysis || {};
      const validFrames = (frames || []).filter(f => f.filename);
      lightboxFrames = validFrames;

      content.innerHTML = `
        <div class="container page">
          <!-- Header -->
          <div class="report-header">
            <div class="logo" id="report-logo">
              <div class="logo-icon">${icons.target}</div>
              <span>BugReel</span>
            </div>
            <span class="text-dim" style="margin-left:auto; font-size:0.8rem;">${escapeHTML(r.id)}</span>
          </div>

          <!-- Title -->
          <h1 style="margin-bottom:4px;">${escapeHTML(card?.title || analysis.title || r.id)}</h1>
          ${card?.summary ? `<p class="card-summary">${escapeHTML(card.summary)}</p>` : ''}
          <div class="report-meta mb-24">
            ${card?.type ? `<span class="badge badge-${card.type}">${escapeHTML(card.type)}</span>` : ''}
            <span class="detail-meta-item">${icons.user} ${escapeHTML(r.author || '--')}</span>
            <span class="detail-meta-item">${icons.calendar} ${formatDate(r.created_at)}</span>
            <span class="detail-meta-item">${icons.clock} ${formatDuration(r.duration_seconds)}</span>
            <a href="${videoUrl(r.id)}" download="${r.id}.webm" class="btn btn-sm" style="margin-left:auto; gap:6px; font-size:0.75rem;">
              ${icons.video} ${t('report_download', 'Download')}
              <span style="font-size:0.65rem; color:var(--text3);">${formatFileSize(r.file_size_bytes)}</span>
            </a>
          </div>

          <!-- Two-column: video+gallery left, analysis right -->
          <div class="report-layout">
            <div>
              <!-- Video -->
              <div class="video-container">
                <video id="videoPlayer" controls preload="metadata">
                  <source src="${videoUrl(r.id)}" type="video/webm">
                </video>
              </div>

              <!-- Timeline -->
              ${validFrames.length ? `<div id="timelineContainer"></div>` : ''}

              <!-- Screenshot gallery under video -->
              ${validFrames.length ? `
                <div class="report-gallery" id="gallery">
                  ${validFrames.map((f, i) => `
                    <div class="report-gallery-item" data-index="${i}">
                      <img src="${frameUrl(r.id, f.filename)}" alt="Frame ${i + 1}" loading="lazy">
                      <span class="gallery-time">${formatTimecode(f.time_seconds)}</span>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>

            <!-- Right: analysis -->
            <div>
              ${renderReportAnalysis(analysis, card)}
            </div>
          </div>

          <!-- Video Comments Section -->
          <div class="video-comments" id="videoComments">
            <div class="video-comments-header">
              <h2>${icons.messageCircle} Comments</h2>
              <span class="comment-count" id="commentCount">...</span>
            </div>

            <!-- Add Comment Form -->
            <div class="comment-form" id="commentForm">
              <div class="comment-form-row">
                <input type="text" id="commentAuthor" placeholder="Your name" maxlength="100" />
              </div>
              <textarea id="commentText" placeholder="Write a comment..." rows="3" maxlength="2000"></textarea>
              <div class="comment-form-footer">
                <label class="comment-timecode-toggle">
                  <input type="checkbox" id="commentTimecodeCheck" />
                  Link to current time
                  <span class="comment-timecode-preview" id="commentTimecodePreview" style="display:none;"></span>
                </label>
                <button class="btn-submit" id="commentSubmit">Post comment</button>
              </div>
              <div class="comment-form-error" id="commentError" style="display:none;"></div>
            </div>

            <!-- Comments List -->
            <div class="comment-list" id="commentList">
              <div class="comments-empty">Loading comments...</div>
            </div>
          </div>
        </div>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox" style="display:none;">
          <button class="lightbox-close" id="lb-close">&times;</button>
          <button class="lightbox-nav lightbox-prev" id="lb-prev">${icons.chevronLeft}</button>
          <button class="lightbox-nav lightbox-next" id="lb-next">${icons.chevronRight}</button>
          <img id="lb-img" src="" alt="">
          <div class="lightbox-caption" id="lb-caption"></div>
          <div class="lightbox-counter" id="lb-counter"></div>
        </div>
      `;

      setupTimeline(validFrames, r.duration_seconds);
      setupGallery(validFrames);
      setupLightbox();
      loadComments();
      setupCommentForm();
      loadBranding();
    }

    function renderReportAnalysis(a, card) {
      const sec = (title, text) => text ? `<div class="report-section"><h3>${title}</h3><p>${escapeHTML(text)}</p></div>` : '';
      const secList = (title, items, ordered) => {
        if (!items?.length) return '';
        const tag = ordered ? 'ol' : 'ul';
        return `<div class="report-section"><h3>${title}</h3><${tag} style="color:var(--text2); font-size:0.9rem; line-height:1.8; padding-left:16px;">${items.map(s => `<li>${escapeHTML(s)}</li>`).join('')}</${tag}></div>`;
      };

      const type = a.type || 'bug';
      let html = '';

      if (type === 'bug') {
        html += secList(t('steps_to_reproduce', 'Steps to Reproduce'), a.steps, true);
        html += sec(t('expected_result', 'Expected Result'), a.expected);
        html += sec(t('actual_result', 'Actual Result'), a.actual);
      } else if (type === 'feature') {
        html += sec(t('proposal', 'Proposal'), a.proposal);
        html += sec(t('use_case', 'Use Case'), a.use_case);
      } else if (type === 'enhancement') {
        html += sec(t('current_behavior', 'Current Behavior'), a.current_behavior);
        html += sec(t('proposed_change', 'Proposed Change'), a.proposed_change);
      } else if (type === 'demo') {
        html += secList(t('key_points', 'Key Points'), a.key_points, false);
        html += sec(t('details', 'Details'), a.details);
      }

      // Fallback for old recordings
      if (!html && a.steps?.length) {
        html += secList(t('steps_to_reproduce', 'Steps to reproduce'), a.steps, true);
        html += sec(t('expected_result', 'Expected result'), a.expected);
        html += sec(t('actual_result', 'Actual result'), a.actual);
      }

      html += sec(t('context', 'Context'), a.context);

      if (!html && card?.description) {
        html += `<div class="report-section"><h3>${t('description', 'Description')}</h3><div class="formatted-text">${renderDescription(card.description)}</div></div>`;
      }

      return html;
    }

    function setupTimeline(frames, duration) {
      const container = document.getElementById('timelineContainer');
      const video = document.getElementById('videoPlayer');
      if (!container || !video || !frames.length) return;

      createTimeline({
        container,
        videoElement: video,
        frames,
        duration: duration || 60,
        recordingId,
        editable: false,
        onKeyframeSelect: (frameId, time) => {
          video.currentTime = time;
        },
      });
    }

    function setupGallery(frames) {
      const gallery = document.getElementById('gallery');
      if (!gallery) return;

      gallery.querySelectorAll('.report-gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          openLightbox(parseInt(item.dataset.index));
        });
      });
    }

    function setupLightbox() {
      const lb = document.getElementById('lightbox');
      if (!lb) return;

      document.getElementById('lb-close').addEventListener('click', closeLightbox);
      document.getElementById('lb-prev').addEventListener('click', () => navigateLightbox(-1));
      document.getElementById('lb-next').addEventListener('click', () => navigateLightbox(1));

      lb.addEventListener('click', (e) => {
        if (e.target === lb) closeLightbox();
      });

      document.addEventListener('keydown', (e) => {
        if (lb.style.display === 'none') return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navigateLightbox(-1);
        if (e.key === 'ArrowRight') navigateLightbox(1);
      });
    }

    function openLightbox(index) {
      lightboxIndex = index;
      const lb = document.getElementById('lightbox');
      lb.style.display = '';
      updateLightbox();
      requestAnimationFrame(() => lb.classList.add('visible'));
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.remove('visible');
      setTimeout(() => { lb.style.display = 'none'; }, 200);
    }

    function navigateLightbox(dir) {
      lightboxIndex = (lightboxIndex + dir + lightboxFrames.length) % lightboxFrames.length;
      updateLightbox();
    }

    function updateLightbox() {
      const f = lightboxFrames[lightboxIndex];
      if (!f) return;
      document.getElementById('lb-img').src = frameUrl(recordingId, f.filename);
      document.getElementById('lb-caption').textContent =
        `${formatTimecode(f.time_seconds)}${f.description ? ' — ' + f.description : ''}`;
      document.getElementById('lb-counter').textContent =
        `${lightboxIndex + 1} / ${lightboxFrames.length}`;

      document.getElementById('lb-prev').style.display = lightboxFrames.length > 1 ? '' : 'none';
      document.getElementById('lb-next').style.display = lightboxFrames.length > 1 ? '' : 'none';
    }

    // --- Video Comments ---

    async function loadBranding() {
      try {
        const res = await fetch('/api/settings');
        if (!res.ok) return;
        const settings = await res.json();
        const logoEl = document.getElementById('report-logo');
        if (!logoEl) return;
        if (settings.branding_logo_url) {
          const link = settings.branding_logo_link || '#';
          logoEl.innerHTML = `<a href="${escapeHTML(link)}" target="_blank" rel="noopener" style="display:flex;align-items:center;text-decoration:none;"><img src="${escapeHTML(settings.branding_logo_url)}" alt="" style="height:28px;max-width:160px;object-fit:contain;"></a>`;
        }
      } catch { /* branding is optional */ }
    }

    async function loadComments() {
      const list = document.getElementById('commentList');
      const countEl = document.getElementById('commentCount');
      if (!list) return;

      try {
        const data = await getVideoComments(recordingId);
        const comments = data.comments || [];
        countEl.textContent = comments.length;

        if (comments.length === 0) {
          list.innerHTML = '<div class="comments-empty">No comments yet. Be the first to comment!</div>';
          return;
        }

        list.innerHTML = comments.map(c => {
          const timecodeHTML = c.timecode_seconds != null
            ? `<span class="video-comment-timecode" data-time="${c.timecode_seconds}">${formatTimecode(c.timecode_seconds)}</span>`
            : '';
          return `
            <div class="video-comment">
              <div class="video-comment-header">
                <span class="video-comment-author">${escapeHTML(c.author_name)}</span>
                ${timecodeHTML}
                <span class="video-comment-time">${timeAgo(c.created_at)}</span>
              </div>
              <div class="video-comment-text">${escapeHTML(c.text)}</div>
            </div>
          `;
        }).join('');

        // Timecode click → seek video
        list.querySelectorAll('.video-comment-timecode').forEach(el => {
          el.addEventListener('click', () => {
            const video = document.getElementById('videoPlayer');
            if (video) {
              video.currentTime = parseFloat(el.dataset.time);
              video.play();
              video.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          });
        });
      } catch (err) {
        list.innerHTML = '<div class="comments-empty">Failed to load comments.</div>';
      }
    }

    function setupCommentForm() {
      const form = document.getElementById('commentForm');
      const authorInput = document.getElementById('commentAuthor');
      const textInput = document.getElementById('commentText');
      const timecodeCheck = document.getElementById('commentTimecodeCheck');
      const timecodePreview = document.getElementById('commentTimecodePreview');
      const submitBtn = document.getElementById('commentSubmit');
      const errorEl = document.getElementById('commentError');
      if (!form || !submitBtn) return;

      // Restore saved author name from localStorage
      const savedName = localStorage.getItem('bugreel_comment_name');
      if (savedName) authorInput.value = savedName;

      // Update timecode preview when checkbox changes or video plays
      function updateTimecodePreview() {
        const video = document.getElementById('videoPlayer');
        if (timecodeCheck.checked && video) {
          timecodePreview.textContent = formatTimecode(video.currentTime);
          timecodePreview.style.display = '';
        } else {
          timecodePreview.style.display = 'none';
        }
      }

      timecodeCheck.addEventListener('change', updateTimecodePreview);

      // Update preview periodically when checked
      const video = document.getElementById('videoPlayer');
      if (video) {
        video.addEventListener('timeupdate', () => {
          if (timecodeCheck.checked) {
            timecodePreview.textContent = formatTimecode(video.currentTime);
          }
        });
      }

      submitBtn.addEventListener('click', async () => {
        const authorName = authorInput.value.trim();
        const text = textInput.value.trim();

        errorEl.style.display = 'none';

        if (!authorName) {
          errorEl.textContent = 'Please enter your name.';
          errorEl.style.display = '';
          authorInput.focus();
          return;
        }
        if (!text) {
          errorEl.textContent = 'Please enter a comment.';
          errorEl.style.display = '';
          textInput.focus();
          return;
        }

        const video = document.getElementById('videoPlayer');
        const timecode = timecodeCheck.checked && video ? video.currentTime : null;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Posting...';

        try {
          await addVideoComment(recordingId, authorName, text, timecode);
          // Save name for next time
          localStorage.setItem('bugreel_comment_name', authorName);
          // Clear form
          textInput.value = '';
          timecodeCheck.checked = false;
          timecodePreview.style.display = 'none';
          // Reload comments
          await loadComments();
        } catch (err) {
          const msg = err.message || 'Failed to post comment.';
          if (msg.includes('429')) {
            errorEl.textContent = 'Too many comments. Please wait a minute before posting again.';
          } else {
            errorEl.textContent = msg;
          }
          errorEl.style.display = '';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Post comment';
        }
      });

      // Allow Ctrl+Enter to submit
      textInput.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          submitBtn.click();
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (shareToken) load();
    });
  </script>

  <!-- View analytics tracking -->
  <script>
    (function() {
      var urlParam = location.pathname.split('/report/')[1];
      if (!urlParam) return;
      urlParam = decodeURIComponent(urlParam.replace(/\/$/, ''));

      var viewId = null;
      var heartbeatInterval = null;

      // Resolve share_token to recording ID, then log the view
      function logView(rid) {
        fetch('/api/analytics/view', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recording_id: rid })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok && data.view_id) {
            viewId = data.view_id;
            heartbeatInterval = setInterval(sendHeartbeat, 30000);
          }
        })
        .catch(function() {});
      }

      // Try to resolve share_token to real recording ID
      fetch('/api/recordings/by-token/' + encodeURIComponent(urlParam))
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (data && data.recording) {
            logView(data.recording.id);
          } else {
            // Fallback: urlParam might be a recording ID directly
            logView(urlParam);
          }
        })
        .catch(function() {
          logView(urlParam);
        });

      function sendHeartbeat() {
        if (!viewId) return;
        fetch('/api/analytics/heartbeat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ view_id: viewId, seconds: 30 })
        }).catch(function() {});
      }

      // Send final heartbeat on page unload via Beacon API
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden' && viewId) {
          var data = JSON.stringify({ view_id: viewId, seconds: 30 });
          if (navigator.sendBeacon) {
            navigator.sendBeacon('/api/analytics/heartbeat',
              new Blob([data], { type: 'application/json' }));
          }
        }
      });

      window.addEventListener('beforeunload', function() {
        if (!viewId) return;
        var data = JSON.stringify({ view_id: viewId, seconds: 30 });
        if (navigator.sendBeacon) {
          navigator.sendBeacon('/api/analytics/heartbeat',
            new Blob([data], { type: 'application/json' }));
        }
        if (heartbeatInterval) clearInterval(heartbeatInterval);
      });
    })();
  </script>
</body>
</html>
