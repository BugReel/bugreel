<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recordings - BugReel</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n-dashboard.js"></script>
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <div class="page-header">
      <h1 data-i18n="index_title">Recordings</h1>
      <p class="page-desc" data-i18n="index_desc">Screen recordings from QA team</p>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <div class="filter-group">
        <label data-i18n="filter_status">Status</label>
        <select id="filterStatus">
          <option value="" data-i18n="filter_all_statuses">All statuses</option>
          <option value="uploaded" data-i18n="status_uploaded">Uploaded</option>
          <option value="transcribed" data-i18n="status_transcribed">Transcribed</option>
          <option value="analyzed" data-i18n="status_analyzed">Analyzed</option>
          <option value="complete" data-i18n="status_complete">Complete</option>
          <option value="error" data-i18n="status_error">Error</option>
          <option value="yt_pending" data-i18n="filter_not_sent">Not sent to tracker</option>
        </select>
      </div>
      <div class="filter-group">
        <label data-i18n="filter_author">Author</label>
        <input type="text" id="filterAuthor" data-i18n="filter_author_placeholder" data-i18n-attr="placeholder" placeholder="Filter by author...">
      </div>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="search" id="filterSearch" data-i18n="filter_search_placeholder" data-i18n-attr="placeholder" placeholder="Search recordings...">
      </div>
    </div>

    <!-- Table -->
    <div id="tableWrapper" class="table-wrapper">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <script type="module">
    import { getRecordings, deleteRecording } from './js/api.js';
    import { renderHeader, initUserMenu, formatDate, formatDuration, statusLabel, icons, escapeHTML, basePath } from './js/shared.js';
    import { initQuotaWidget, retentionBadge } from './js/quota.js';

    const t = window.__dashboardI18n?.t || ((k, f) => f || k);
    const YOUTRACK_URL = window.__BUGREEL_CONFIG__?.youtrackUrl || '';

    // Render header
    document.getElementById('header').innerHTML = renderHeader('recordings');
    initQuotaWidget();
    initUserMenu();

    // State
    let currentOffset = 0;
    const PAGE_SIZE = 25;
    let debounceTimer = null;

    // Elements
    const filterStatus = document.getElementById('filterStatus');
    const filterAuthor = document.getElementById('filterAuthor');
    const filterSearch = document.getElementById('filterSearch');
    const tableWrapper = document.getElementById('tableWrapper');

    // Load and render
    let firstLoad = true;
    async function loadRecordings() {
      if (firstLoad) tableWrapper.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      firstLoad = false;

      try {
        const params = {
          status: filterStatus.value === 'yt_pending' ? undefined : (filterStatus.value || undefined),
          youtrack: filterStatus.value === 'yt_pending' ? 'pending' : undefined,
          author: filterAuthor.value.trim() || undefined,
          limit: PAGE_SIZE,
          offset: currentOffset,
        };

        const data = await getRecordings(params);
        renderTable(data.recordings, data.total);
      } catch (err) {
        tableWrapper.innerHTML = `
          <div class="empty-state">
            ${icons.alertTriangle}
            <p>${t('failed_load_recordings', 'Failed to load recordings')}: ${escapeHTML(err.message)}</p>
          </div>
        `;
      }
    }

    function renderTable(recordings, total) {
      if (!recordings.length) {
        tableWrapper.innerHTML = `
          <div class="empty-state">
            ${icons.inbox}
            <p>${t('no_recordings', 'No recordings found')}</p>
          </div>
        `;
        return;
      }

      const searchTerm = filterSearch.value.trim().toLowerCase();
      let filtered = recordings;
      if (searchTerm) {
        filtered = recordings.filter(r =>
          r.id.toLowerCase().includes(searchTerm) ||
          (r.author || '').toLowerCase().includes(searchTerm)
        );
      }

      const totalPages = Math.ceil(total / PAGE_SIZE);
      const currentPage = Math.floor(currentOffset / PAGE_SIZE) + 1;

      tableWrapper.innerHTML = `
        <table class="table table-clickable">
          <thead>
            <tr>
              <th style="width:56px;"></th>
              <th>${t('th_recording', 'Recording')}</th>
              <th>${t('th_author', 'Author')}</th>
              <th>${t('th_date', 'Date')}</th>
              <th>${t('th_status', 'Status')}</th>
              <th>YT</th>
              <th>${t('th_duration', 'Duration')}</th>
              <th>${icons.eye}</th>
              <th style="width:40px;"></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(r => `
              <tr data-id="${escapeHTML(r.id)}">
                <td>
                  ${r.first_frame
                    ? `<img class="rec-thumb" src="/api/recordings/${encodeURIComponent(r.id)}/frames/${encodeURIComponent(r.first_frame)}" alt="" loading="lazy">`
                    : `<div class="rec-thumb-placeholder">${icons.video}</div>`
                  }
                </td>
                <td>
                  <div class="rec-info">
                    <a href="recording/${encodeURIComponent(r.id)}" style="font-weight:600; font-family:'JetBrains Mono','Fira Code',monospace; font-size:0.8rem;">
                      ${escapeHTML(r.id)}
                    </a>
                    ${r.has_password ? `<span class="badge" style="background:var(--amber-dim); color:var(--amber); font-size:0.6rem; padding:1px 6px; gap:3px;" title="Password protected">${icons.lock}</span>` : ''}
                    ${r.comment_count > 0 ? `<span class="badge" style="background:var(--blue-dim); color:var(--blue); font-size:0.6rem; padding:1px 6px; gap:3px;" title="${r.comment_count} comment${r.comment_count > 1 ? 's' : ''}">${icons.messageCircle} ${r.comment_count}</span>` : ''}
                    ${r.card_title ? `<span class="rec-title">${escapeHTML(r.card_title)}</span>` : ''}
                  </div>
                </td>
                <td>${escapeHTML(r.author || '--')}</td>
                <td class="text-muted">${formatDate(r.created_at)}${retentionBadge(r.created_at)}</td>
                <td><span class="badge badge-${r.status}"><span class="dot"></span>${statusLabel(r.status)}</span></td>
                <td>${(() => {
                  const ytId = r.card_youtrack_id || r.youtrack_issue_id;
                  if (ytId) {
                    const ytUrl = r.youtrack_url || YOUTRACK_URL + '/issue/' + ytId;
                    return `<a href="${ytUrl}" target="_blank" class="yt-badge" title="${escapeHTML(ytId)}" onclick="event.stopPropagation()">${icons.checkCircle}<span>${escapeHTML(ytId)}</span></a>`;
                  }
                  if (r.pending_youtrack_issue_id) {
                    const ytUrl = YOUTRACK_URL + '/issue/' + r.pending_youtrack_issue_id;
                    return `<a href="${ytUrl}" target="_blank" class="yt-badge" style="background:var(--amber-dim);color:var(--amber);" title="Pending export" onclick="event.stopPropagation()">${icons.clock}<span>${escapeHTML(r.pending_youtrack_issue_id)}</span></a>`;
                  }
                  return '';
                })()}</td>
                <td class="text-muted">${formatDuration(r.duration_seconds)}</td>
                <td class="text-muted">${r.view_count > 0 ? r.view_count : ''}</td>
                <td><button class="btn-icon btn-delete-rec" data-id="${escapeHTML(r.id)}" title="${t('delete', 'Delete')}" onclick="event.stopPropagation()">${icons.trash}</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        ${total > PAGE_SIZE ? `
          <div class="pagination">
            <div class="pagination-info">
              ${t('showing', 'Showing')} ${currentOffset + 1}-${Math.min(currentOffset + PAGE_SIZE, total)} ${t('of', 'of')} ${total}
            </div>
            <div class="pagination-buttons">
              <button class="btn btn-sm" ${currentPage <= 1 ? 'disabled' : ''} data-page="prev">
                ${icons.chevronLeft}
              </button>
              ${buildPageButtons(currentPage, totalPages)}
              <button class="btn btn-sm" ${currentPage >= totalPages ? 'disabled' : ''} data-page="next">
                ${icons.chevronRight}
              </button>
            </div>
          </div>
        ` : ''}
      `;

      // Row click handler
      tableWrapper.querySelectorAll('tbody tr').forEach(tr => {
        tr.addEventListener('click', (e) => {
          if (e.target.tagName === 'A') return;
          const id = tr.dataset.id;
          window.location.href = `${basePath}/recording/${encodeURIComponent(id)}`;
        });
      });

      // Delete button handler
      tableWrapper.querySelectorAll('.btn-delete-rec').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.dataset.id;
          showDeleteConfirm(id);
        });
      });

      // Pagination click
      tableWrapper.querySelectorAll('.pagination-buttons .btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.dataset.page;
          if (page === 'prev' && currentOffset >= PAGE_SIZE) {
            currentOffset -= PAGE_SIZE;
          } else if (page === 'next' && currentOffset + PAGE_SIZE < total) {
            currentOffset += PAGE_SIZE;
          } else if (!isNaN(page)) {
            currentOffset = (parseInt(page) - 1) * PAGE_SIZE;
          }
          loadRecordings();
        });
      });
    }

    function buildPageButtons(current, total) {
      const pages = [];
      const maxVisible = 5;
      let start = Math.max(1, current - Math.floor(maxVisible / 2));
      let end = Math.min(total, start + maxVisible - 1);
      start = Math.max(1, end - maxVisible + 1);

      for (let i = start; i <= end; i++) {
        pages.push(`<button class="btn btn-sm ${i === current ? 'active' : ''}" data-page="${i}">${i}</button>`);
      }
      return pages.join('');
    }

    // Delete confirmation modal
    function showDeleteConfirm(id) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-dialog" style="max-width:420px;">
          <div class="modal-header">
            <h3>${t('delete_recording', 'Delete recording')}</h3>
            <button class="modal-close" id="delCancel">${icons.x}</button>
          </div>
          <div class="modal-body">
            <p>${t('delete_confirm_text', 'Are you sure you want to delete')} <strong>${escapeHTML(id)}</strong>?</p>
            <p class="text-muted" style="font-size:0.85rem;">${t('delete_warning', 'Video, frames, and all associated data will be permanently removed.')}</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-sm" id="delCancelBtn">${t('cancel', 'Cancel')}</button>
            <button class="btn btn-sm btn-danger" id="delConfirmBtn">${t('delete', 'Delete')}</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const close = () => overlay.remove();
      overlay.querySelector('#delCancel').addEventListener('click', close);
      overlay.querySelector('#delCancelBtn').addEventListener('click', close);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
      document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); } });

      overlay.querySelector('#delConfirmBtn').addEventListener('click', async () => {
        const btn = overlay.querySelector('#delConfirmBtn');
        btn.disabled = true;
        btn.textContent = '...';
        try {
          await deleteRecording(id);
          close();
          loadRecordings();
        } catch (err) {
          btn.textContent = t('error', 'Error');
          btn.disabled = false;
          console.error('Delete failed:', err);
        }
      });
    }

    // Event listeners
    filterStatus.addEventListener('change', () => { currentOffset = 0; loadRecordings(); });

    filterAuthor.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { currentOffset = 0; loadRecordings(); }, 400);
    });

    filterSearch.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { currentOffset = 0; loadRecordings(); }, 300);
    });

    // Initial load + auto-refresh every 5s (for processing status updates)
    document.addEventListener('DOMContentLoaded', () => {
      loadRecordings();
      setInterval(loadRecordings, 5000);
    });
  </script>
</body>
</html>
