<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - BugReel</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n-dashboard.js"></script>
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <div class="page-header">
      <h1 data-i18n="analytics_title">Analytics</h1>
      <p class="page-desc" data-i18n="analytics_desc">Overview of recordings and processing</p>
    </div>

    <div id="analytics">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <script type="module">
    import { getRecordings, getCards, getViewAnalytics } from './js/api.js';
    import {
      renderHeader, formatDate, formatDuration, statusLabel,
      escapeHTML, icons, timeAgo
    } from './js/shared.js';

    const t = window.__dashboardI18n?.t || ((k, f) => f || k);
    document.getElementById('header').innerHTML = renderHeader('analytics');

    const container = document.getElementById('analytics');

    async function load() {
      try {
        const [recData, cardData, viewData] = await Promise.all([
          getRecordings({ limit: 200, offset: 0 }),
          getCards({ limit: 200, offset: 0 }),
          getViewAnalytics().catch(() => null),
        ]);

        render(recData, cardData, viewData);
      } catch (err) {
        container.innerHTML = `
          <div class="empty-state">
            ${icons.alertTriangle}
            <p>${t('failed_load_analytics', 'Failed to load analytics')}: ${escapeHTML(err.message)}</p>
          </div>
        `;
      }
    }

    function render(recData, cardData, viewData) {
      const recordings = recData.recordings || [];
      const cards = cardData.cards || [];
      const totalRec = recData.total || recordings.length;

      // Exported count
      const exported = cards.filter(c => c.youtrack_issue_id).length;
      const notExported = cards.filter(c => !c.youtrack_issue_id).length;

      // Recordings by status
      const recByStatus = {};
      recordings.forEach(r => {
        const s = r.status || 'uploaded';
        recByStatus[s] = (recByStatus[s] || 0) + 1;
      });

      // Type distribution
      const typeCount = { bug: 0, feature: 0, enhancement: 0 };
      cards.forEach(c => {
        if (typeCount.hasOwnProperty(c.type)) typeCount[c.type]++;
      });
      const maxType = Math.max(...Object.values(typeCount), 1);

      // By author
      const authorCount = {};
      recordings.forEach(r => {
        const a = r.author || 'unknown';
        authorCount[a] = (authorCount[a] || 0) + 1;
      });
      const authorsSorted = Object.entries(authorCount).sort((a, b) => b[1] - a[1]);
      const maxAuthor = Math.max(...Object.values(authorCount), 1);

      // Recent activity
      const activities = [];
      recordings.slice(0, 15).forEach(r => {
        activities.push({
          text: `<strong>${escapeHTML(r.author || 'Unknown')}</strong> ${t('analytics_recorded', 'recorded')} <strong>${escapeHTML(r.card_title || r.id)}</strong>`,
          date: r.created_at,
          dotColor: r.status === 'error' ? 'red' : r.status === 'complete' ? 'green' : 'blue',
          link: `/recording/${encodeURIComponent(r.id)}`,
        });
      });
      activities.sort((a, b) => new Date(b.date) - new Date(a.date));

      container.innerHTML = `
        <!-- Summary Cards -->
        <div class="grid-4 mb-24">
          <div class="card">
            <div class="flex justify-between items-center">
              <div>
                <div class="card-title">${t('analytics_recordings', 'Recordings')}</div>
                <div class="card-value">${totalRec}</div>
              </div>
              <div class="stat-icon blue">${icons.video}</div>
            </div>
          </div>
          <div class="card">
            <div class="flex justify-between items-center">
              <div>
                <div class="card-title">${t('analytics_exported', 'Exported to YT')}</div>
                <div class="card-value">${exported}</div>
                <div class="card-subtitle">${t('of', 'of')} ${cards.length} ${t('analytics_processed', 'processed')}</div>
              </div>
              <div class="stat-icon green">${icons.checkCircle}</div>
            </div>
          </div>
          <div class="card">
            <div class="flex justify-between items-center">
              <div>
                <div class="card-title">${t('analytics_pending', 'Pending Export')}</div>
                <div class="card-value">${notExported}</div>
              </div>
              <div class="stat-icon amber">${icons.clock}</div>
            </div>
          </div>
          <div class="card">
            <div class="flex justify-between items-center">
              <div>
                <div class="card-title">${t('analytics_error_rate', 'Error Rate')}</div>
                <div class="card-value">${totalRec > 0 ? (((recByStatus.error || 0) / totalRec) * 100).toFixed(0) : 0}%</div>
                <div class="card-subtitle">${recByStatus.error || 0} ${t('analytics_errors', 'errors')}</div>
              </div>
              <div class="stat-icon red">${icons.alertTriangle}</div>
            </div>
          </div>
        </div>

        <div class="grid-2 mb-24">
          <!-- Type Distribution -->
          <div class="card">
            <h3 class="mb-16">${t('analytics_by_type', 'By Type')}</h3>
            <div class="dist-bar-container">
              ${[['bug', t('analytics_bugs', 'Bugs'), 'var(--red)'], ['feature', t('analytics_features', 'Features'), 'var(--blue)'], ['enhancement', t('analytics_enhancements', 'Enhancements'), 'var(--violet)']].map(([key, label, color]) => `
                <div class="dist-bar-row">
                  <span class="dist-bar-label">${label}</span>
                  <div class="dist-bar-track">
                    ${typeCount[key] > 0 ? `
                      <div class="dist-bar-fill" style="width: ${(typeCount[key] / maxType) * 100}%; background: ${color};">
                        ${typeCount[key]}
                      </div>
                    ` : ''}
                  </div>
                  <span class="dist-bar-count">${typeCount[key]}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- By Author -->
          <div class="card">
            <h3 class="mb-16">${t('analytics_by_author', 'By Author')}</h3>
            ${authorsSorted.length > 0 ? `
              <div class="dist-bar-container">
                ${authorsSorted.map(([author, count]) => `
                  <div class="dist-bar-row">
                    <span class="dist-bar-label">${escapeHTML(author)}</span>
                    <div class="dist-bar-track">
                      <div class="dist-bar-fill" style="width: ${(count / maxAuthor) * 100}%; background: var(--blue);">
                        ${count}
                      </div>
                    </div>
                    <span class="dist-bar-count">${count}</span>
                  </div>
                `).join('')}
              </div>
            ` : `<div class="text-dim text-sm">${t('analytics_no_recordings', 'No recordings yet')}</div>`}
          </div>
        </div>

        <!-- Views Section -->
        ${viewData ? `
        <div class="grid-2 mb-24">
          <div class="card">
            <h3 class="mb-16">${icons.eye} ${t('analytics_views', 'Views')}</h3>
            <div class="grid-3" style="gap:16px; margin-bottom:16px;">
              <div>
                <div class="card-value">${viewData.total_views || 0}</div>
                <div class="card-title">${t('analytics_total_views', 'Total Views')}</div>
              </div>
              <div>
                <div class="card-value">${viewData.unique_viewers || 0}</div>
                <div class="card-title">${t('analytics_unique_viewers', 'Unique Viewers')}</div>
              </div>
              <div>
                <div class="card-value">${formatDuration(viewData.avg_watch_duration || 0)}</div>
                <div class="card-title">${t('analytics_avg_watch', 'Avg Watch Time')}</div>
              </div>
            </div>
            ${viewData.views_by_day && viewData.views_by_day.length > 0 ? `
              <div class="analytics-chart-title text-dim text-xs mb-8">${t('analytics_views_over_time', 'Views Over Time')}</div>
              <div class="dist-bar-container">
                ${(() => {
                  const days = viewData.views_by_day;
                  const maxV = Math.max(...days.map(d => d.count), 1);
                  return days.map(d => `
                    <div class="dist-bar-row">
                      <span class="dist-bar-label" style="width:70px;">${d.date.slice(5)}</span>
                      <div class="dist-bar-track">
                        ${d.count > 0 ? `<div class="dist-bar-fill" style="width: ${(d.count / maxV) * 100}%; background: var(--blue);">${d.count}</div>` : ''}
                      </div>
                      <span class="dist-bar-count">${d.count}</span>
                    </div>
                  `).join('');
                })()}
              </div>
            ` : `<div class="text-dim text-sm">${t('no_views_yet', 'No views yet')}</div>`}
          </div>

          <!-- Top Recordings -->
          <div class="card">
            <h3 class="mb-16">${t('analytics_top_recordings', 'Top Recordings by Views')}</h3>
            ${viewData.top_recordings && viewData.top_recordings.length > 0 ? `
              <div class="dist-bar-container">
                ${(() => {
                  const maxV = Math.max(...viewData.top_recordings.map(r => r.view_count), 1);
                  return viewData.top_recordings.map(r => `
                    <div class="dist-bar-row">
                      <span class="dist-bar-label"><a href="/recording/${encodeURIComponent(r.recording_id)}" style="color:var(--text);text-decoration:none;">${escapeHTML(r.card_title || r.recording_id)}</a></span>
                      <div class="dist-bar-track">
                        <div class="dist-bar-fill" style="width: ${(r.view_count / maxV) * 100}%; background: var(--blue);">${r.view_count}</div>
                      </div>
                      <span class="dist-bar-count">${r.view_count}</span>
                    </div>
                  `).join('');
                })()}
              </div>
            ` : `<div class="text-dim text-sm">${t('analytics_no_recordings', 'No recordings yet')}</div>`}
          </div>
        </div>
        ` : ''}

        <!-- Recent Activity -->
        <div class="card">
          <h3 class="mb-16">${t('analytics_recent', 'Recent Activity')}</h3>
          ${activities.length > 0 ? `
            <div class="activity-list">
              ${activities.slice(0, 15).map(a => `
                <a href="${a.link}" class="activity-item" style="text-decoration:none;">
                  <div class="activity-dot ${a.dotColor}"></div>
                  <div class="activity-content">
                    <div class="activity-text">${a.text}</div>
                    <div class="activity-time">${timeAgo(a.date)}</div>
                  </div>
                </a>
              `).join('')}
            </div>
          ` : `<div class="text-dim text-sm">${t('analytics_no_activity', 'No activity yet')}</div>`}
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
