<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BugReel</title>
  <script src="js/i18n-dashboard.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a14;
      --surface: #0e1525;
      --surface2: #151d30;
      --border: #1e2d48;
      --text: #e2e8f0;
      --text2: #64748b;
      --blue: #3b82f6;
      --violet: #8b5cf6;
      --red: #ef4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient background */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: drift 20s ease-in-out infinite;
    }

    .ambient-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: var(--blue);
      top: -20%; left: -10%;
      animation-delay: 0s;
    }

    .ambient-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: var(--violet);
      bottom: -25%; right: -10%;
      animation-delay: -7s;
      animation-duration: 25s;
    }

    .ambient-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: #06b6d4;
      top: 50%; left: 60%;
      opacity: 0.08;
      animation-delay: -14s;
      animation-duration: 30s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* Grid pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
    }

    /* Login container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      padding: 0 20px;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow:
        0 0 0 1px rgba(139, 92, 246, 0.2),
        0 8px 24px rgba(59, 130, 246, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      color: white;
    }

    .logo-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .logo-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text2);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Form card */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      backdrop-filter: blur(20px);
    }

    /* Input */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text2);
      transition: color 0.2s;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input::placeholder {
      color: var(--text2);
    }

    .input-group input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .input-group input:focus ~ svg {
      color: var(--blue);
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--blue), #6366f1);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error */
    .error-msg {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.15);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: rgba(100, 116, 139, 0.5);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <!-- Ambient background -->
  <div class="ambient">
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
  </div>
  <div class="grid-pattern"></div>

  <!-- Login form -->
  <div class="login-container">
    <div class="logo-area">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="6"></circle>
          <circle cx="12" cy="12" r="2"></circle>
        </svg>
      </div>
      <div class="logo-title brand-name">BugReel</div>
      <div class="logo-subtitle" data-i18n="login_subtitle">Screen Recording QA Tool</div>
    </div>

    <div class="form-card">
      <div class="error-msg" id="error"></div>

      <form id="loginForm">
        <div class="input-group">
          <input type="password" id="password" data-i18n="login_placeholder" data-i18n-attr="placeholder" placeholder="Enter password" autocomplete="current-password" autofocus>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <button type="submit" class="login-btn" data-i18n="login_btn">Sign in</button>
      </form>
    </div>

    <div class="login-footer" data-i18n="login_footer">Screen recording &rarr; AI analysis &rarr; YouTrack</div>
  </div>

  <script>
    // Apply branding to login page (hidden via CSS, revealed after load)
    fetch('/api/branding').then(r => r.json()).then(b => {
      if (b.name && b.name !== 'BugReel') {
        document.querySelectorAll('.brand-name').forEach(el => { el.textContent = b.name; });
        document.title = document.title.replace(/BugReel/g, b.name);
      }
      document.querySelectorAll('.brand-name').forEach(el => { el.style.opacity = '1'; });
    }).catch(() => {
      document.querySelectorAll('.brand-name').forEach(el => { el.style.opacity = '1'; });
    });

    const t = window.__dashboardI18n?.t || ((k, f) => f || k);
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = e.target.querySelector('button');

      btn.disabled = true;
      btn.textContent = t('login_signing_in', 'Signing in...');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          // Redirect to dashboard root (works with reverse-proxy path prefix)
          window.location.href = window.location.pathname.replace(/\/login\/?$/, '/') || '/';
        } else {
          errorEl.textContent = t('login_wrong_password', 'Wrong password');
          errorEl.style.display = 'block';
          document.getElementById('password').select();
        }
      } catch {
        errorEl.textContent = t('login_connection_error', 'Connection error');
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = t('login_btn', 'Sign in');
      }
    });
  </script>
</body>
</html>
