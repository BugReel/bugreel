<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="review_title">Review Recording - BugReel</title>
  <script src="i18n.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 90%; max-width: 1100px; padding: 32px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .subtitle { font-size: 12px; color: #64748b; margin-left: auto; }

    .player-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    video { width: 100%; display: block; max-height: 560px; background: #000; }

    .meta { display: flex; gap: 24px; padding: 12px 16px; border-top: 1px solid #334155; font-size: 13px; color: #94a3b8; }
    .meta strong { color: #e2e8f0; }

    /* Trim controls */
    .trim-section { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .trim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .trim-header span:first-child { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .trim-times { display: flex; gap: 8px; font-size: 12px; font-variant-numeric: tabular-nums; }
    .trim-times .time-badge { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 2px 8px; color: #e2e8f0; font-weight: 600; }

    .trim-track-wrapper { position: relative; height: 40px; margin-bottom: 12px; user-select: none; }
    .trim-track { position: absolute; top: 50%; left: 0; right: 0; height: 6px; transform: translateY(-50%); background: #334155; border-radius: 3px; }
    .trim-range { position: absolute; top: 50%; height: 6px; transform: translateY(-50%); background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; }
    .trim-handle { position: absolute; top: 50%; width: 16px; height: 28px; transform: translate(-50%, -50%); background: #e2e8f0; border: 2px solid #3b82f6; border-radius: 4px; cursor: ew-resize; z-index: 2; transition: box-shadow 0.15s; }
    .trim-handle:hover, .trim-handle.dragging { box-shadow: 0 0 0 4px rgba(59,130,246,0.3); }
    .trim-handle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 12px; background: #3b82f6; border-radius: 1px; }

    /* Playhead */
    .playhead { position: absolute; top: 50%; width: 2px; height: 32px; transform: translate(-50%, -50%); background: #f8fafc; border-radius: 1px; z-index: 4; pointer-events: none; box-shadow: 0 0 4px rgba(248,250,252,0.5); transition: left 0.1s linear; }

    /* Cut zones */
    .cut-zone { position: absolute; top: 50%; height: 6px; transform: translateY(-50%); background: repeating-linear-gradient(45deg, rgba(239,68,68,0.7), rgba(239,68,68,0.7) 3px, rgba(239,68,68,0.3) 3px, rgba(239,68,68,0.3) 6px); border-radius: 3px; z-index: 1; }
    .cut-handle { position: absolute; top: 50%; width: 10px; height: 22px; transform: translate(-50%, -50%); background: #ef4444; border: 2px solid #dc2626; border-radius: 3px; cursor: ew-resize; z-index: 3; transition: box-shadow 0.15s; }
    .cut-handle:hover, .cut-handle.dragging { box-shadow: 0 0 0 3px rgba(239,68,68,0.4); }
    .cut-handle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 8px; background: #fca5a5; border-radius: 1px; }

    /* Cuts list */
    .cuts-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .cut-item { display: flex; align-items: center; gap: 6px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; padding: 3px 6px 3px 10px; font-size: 11px; }
    .cut-item-time { color: #fca5a5; font-weight: 600; font-variant-numeric: tabular-nums; }
    .cut-item-dur { color: #64748b; }
    .cut-item-remove { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; font-weight: 700; }
    .cut-item-remove:hover { color: #f87171; }

    .trim-actions { display: flex; gap: 8px; align-items: center; }
    .btn-sm { padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .btn-sm:hover { opacity: 0.9; }
    .btn-preview { background: #334155; color: #e2e8f0; }
    .btn-reset { background: transparent; color: #64748b; border: 1px solid #334155; }
    .btn-add-cut { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-add-cut:hover { background: rgba(239,68,68,0.25); }
    .trim-info { font-size: 11px; color: #64748b; margin-left: auto; }

    .actions { display: flex; gap: 12px; margin-bottom: 16px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-upload { background: #3b82f6; color: white; }
    .btn-upload:hover { background: #2563eb; }
    .btn-discard { background: #334155; color: #94a3b8; }
    .btn-discard:hover { background: #475569; color: #e2e8f0; }

    .progress-container { margin-bottom: 16px; display: none; }
    .progress-track { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 4px; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #94a3b8; margin-top: 6px; text-align: center; }
    .upload-controls { display: flex; }
    .upload-controls.hidden, .btn-sm.hidden { display: none !important; }

    .status { text-align: center; font-size: 13px; color: #94a3b8; min-height: 20px; }
    .status a { color: #3b82f6; text-decoration: none; font-weight: 600; }
    .status a:hover { text-decoration: underline; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }

    .empty { text-align: center; padding: 48px; color: #64748b; }
    .empty p { font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body class="review-page">
  <div class="container">
    <div class="header">
      <h1 data-i18n="brandName">BugReel</h1>
      <span class="subtitle" data-i18n="review_subtitle">Review Recording</span>
    </div>

    <div id="content">
      <div class="empty"><p data-i18n="review_loading">Loading recording...</p></div>
    </div>
  </div>

  <script src="idb-helper.js"></script>
  <script src="review.js"></script>
</body>
</html>
